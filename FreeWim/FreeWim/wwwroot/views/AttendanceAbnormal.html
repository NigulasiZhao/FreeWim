<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤异常汇总</title>

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="stylesheet" href="/lib/flatpickr/material_blue.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/lib/flatpickr/flatpickr.min.js"></script>
    <script src="/lib/flatpickr/zh.js"></script>
    <script src="/js/dashboard-utils.js"></script>

    <style>
        /* 返回按钮 */
        .back-btn {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--primary-color);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.15s;
        }

        .back-btn:hover {
            background: var(--hover-bg);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .back-btn.show {
            display: flex;
        }

        /* 分页样式 */
        .pagination {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 20px 0;
        }

        .pagination.show {
            display: flex;
        }

        .pagination button {
            min-width: 36px;
            height: 36px;
            padding: 0 16px;
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--hover-bg);
            border-color: var(--primary-color);
        }

        .pagination button.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 空状态 */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部筛选区 - 固定 -->
        <div class="filter-section">

            <div class="filter-row">
                <!-- 日期范围 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="dateRange" class="form-input" placeholder="选择日期范围" style="width: 240px;">
                </div>

                <!-- 部门 -->
                <div id="orgFilter" style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-building" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="orgName" class="form-input" placeholder="部门名称" style="width: 160px;">
                </div>

                <!-- 用户姓名 -->
                <div id="userFilter" style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="userName" class="form-input" placeholder="用户姓名" style="width: 140px;">
                </div>

                <div style="flex: 1;"></div>
 <button class="back-btn" id="backBtn" onclick="backToSummary()">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回汇总</span>
                </button>
                <!-- 查询按钮 -->
                <button class="btn" onclick="fetchData()" id="searchBtn">
                    <i class="fas fa-search"></i>
                    <span>查询数据</span>
              </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="display: flex; flex-direction: column;">
            <!-- 数据表格 -->
            <div class="table-container" style="position: relative; flex: 1;">
                <!-- 全屏加载遮罩 -->
                <div id="fullLoading" class="loading-overlay">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                    <p style="margin-top: 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">正在加载数据...</p>
                </div>

                <table class="data-table" id="dataTable">
                    <thead>
                        <tr id="tableHeader">
                            <!-- 表头将通过 JS 动态生成 -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过 JS 插入 -->
                    </tbody>
                </table>

                <!-- 空状态 -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p style="font-size: 16px; font-weight: 500; margin-bottom: 8px;">暂无数据</p>
                    <p style="font-size: 14px; opacity: 0.7;">请选择日期范围后查询</p>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button onclick="changePage(-1)" id="prevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="pageInfo" style="font-size: 14px; color: var(--text-secondary); margin: 0 16px;">
                    第 <span id="currentPage">1</span> 页，共 <span id="dataCount">0</span> 条
                </span>
                <button onclick="changePage(1)" id="nextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        const URLS = {
            summary: '/api/AttendanceRecord/AttendanceAbnormalSummary',
            detail: '/api/AttendanceRecord/AttendanceAbnormalDetail'
        };

        let state = {
            mode: 'summary', // 'summary' | 'detail'
            userId: '',
            userName: '',
            orgId: '',
            page: 1,
            pageSize: 100,
            sortField: 'TotalAbnormalDays',
            sortOrder: 'desc'
        };

        let flatpickrInstance = null;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDatePicker();
            // initDefaultQuery() 将在flatpickr的onReady回调中执行
        });

        // ==================== 初始化日期选择器 ====================
        function initDatePicker() {
            const now = new Date();
            const yearStart = new Date(now.getFullYear(), 0, 1);
            const yearEnd = new Date(now.getFullYear(), 11, 31);

            flatpickrInstance = flatpickr("#dateRange", {
                mode: "range",
                locale: "zh",
                dateFormat: "Y-m-d",
                defaultDate: [yearStart, yearEnd],
                onReady: function(selectedDates, dateStr, instance) {
                    // 使用setTimeout确保flatpickr完全初始化后再执行查询
                    setTimeout(() => {
                        initDefaultQuery();
                    }, 100);
                }
            });
        }

        // ==================== 初始化默认查询 ====================
        function initDefaultQuery() {
            state.sortField = 'TotalAbnormalDays';
            state.sortOrder = 'desc';
            fetchData();
        }

        // ==================== 返回汇总 ====================
        function backToSummary() {
            state.mode = 'summary';
            state.userId = '';
            state.userName = '';
            state.orgId = '';
            state.page = 1;
            state.sortField = 'TotalAbnormalDays';
            state.sortOrder = 'desc';

            document.getElementById('backBtn').classList.remove('show');
            document.getElementById('orgFilter').style.display = 'flex';
            document.getElementById('userFilter').style.display = 'flex';

            fetchData();
        }

        // ==================== 显示用户明细 ====================
        function showDetail(userId, userName, orgId) {
            state.mode = 'detail';
            state.userId = userId;
            state.userName = userName;
            state.orgId = orgId || '';
            state.page = 1;
            state.sortField = 'ClockInDate';
            state.sortOrder = 'asc';

            document.getElementById('backBtn').classList.add('show');
            document.getElementById('orgFilter').style.display = 'none';
            document.getElementById('userFilter').style.display = 'none';

            fetchData();
        }

        // ==================== 排序逻辑 ====================
        function handleSort(field) {
            if (state.sortField === field) {
                state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                state.sortField = field;
                state.sortOrder = 'desc';
            }
            state.page = 1;
            fetchData();
        }

        // ==================== 翻页 ====================
        function changePage(delta) {
            state.page += delta;
            if (state.page < 1) state.page = 1;
            fetchData();
        }

        // ==================== 加载数据 ====================
        async function fetchData() {
            const dates = flatpickrInstance.selectedDates;
            if (dates.length < 1) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('tableBody').innerHTML = '';
                document.getElementById('pagination').classList.remove('show');
                return;
            }

            LoadingOverlay.show(document.querySelector('.table-container'));
            document.getElementById('emptyState').style.display = 'none';

            try {
                const startTime = flatpickrInstance.formatDate(dates[0], "Y-m-d");
                const endTime = flatpickrInstance.formatDate(dates[dates.length - 1], "Y-m-d");
                const orgName = document.getElementById('orgName').value.trim();
                const userName = document.getElementById('userName').value.trim();

                const url = state.mode === 'summary' ? URLS.summary : URLS.detail;
                const payload = {
                    startTime: startTime,
                    endTime: endTime,
                    page: state.page,
                    rows: state.pageSize,
                    order: state.sortField,
                    sort: state.sortOrder
                };

                if (state.mode === 'summary') {
                    if (orgName) payload.orgName = orgName;
                    if (userName) payload.userName = userName;
                } else {
                    payload.userId = state.userId;
                    if (state.orgId) payload.orgId = state.orgId;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                renderTable(data);
                updatePagination(data.length);

            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败: ' + error.message);
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('tableBody').innerHTML = '';
            } finally {
                LoadingOverlay.hide();
            }
        }

        // ==================== 渲染表格 ====================
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('pagination').classList.remove('show');
                return;
            }

            emptyState.style.display = 'none';

            if (state.mode === 'summary') {
                renderSummaryTable(data);
            } else {
                renderDetailTable(data);
            }
        }

        // ==================== 渲染汇总表格 ====================
        function renderSummaryTable(data) {
            const columns = [
                { key: 'userName', label: '姓名', sortable: true },
                { key: 'orgName', label: '部门', sortable: true },
                { key: 'MissingCardDays', label: '缺卡天数', sortable: true },
                { key: 'EarlyLeaveDays', label: '早退天数', sortable: true },
                { key: 'LateAndEarlyLeaveDays', label: '迟到早退天数', sortable: true },
                { key: 'FieldLateDays', label: '外勤迟到天数', sortable: true },
                { key: 'FieldEarlyLeaveDays', label: '外勤早退天数', sortable: true },
                { key: 'SupplementCardDays', label: '补卡天数', sortable: true },
                { key: 'CompensatoryLeaveDays', label: '调休天数', sortable: true },
                { key: 'TotalLeaveDays', label: '请假天数', sortable: true },
                { key: 'TotalAbnormalDays', label: '异常总天数', sortable: true }
            ];

            // 更新表头
            const thead = document.getElementById('tableHeader');
            thead.innerHTML = columns.map(col => {
                const arrow = state.sortField === col.key
                    ? (state.sortOrder === 'asc' ? ' ↑' : ' ↓')
                    : '';
                const sortableClass = col.sortable ? 'sortable' : '';
                const onclick = col.sortable ? `onclick="handleSort('${col.key}')"` : '';
                return `<th class="${sortableClass}" ${onclick} style="text-align: center;">${col.label}${arrow}</th>`;
            }).join('');

            // 渲染数据行
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(row => `
                <tr onclick="showDetail('${row.userId}', '${row.userName}', '${row.orgId || ''}')">
                    <td style="font-weight: 600;">${row.userName || '-'}</td>
                    <td><span class="badge badge-gray">${row.orgName || '-'}</span></td>
                    <td style="text-align: center;">${renderBadge(row.missingCardDays, 'danger')}</td>
                    <td style="text-align: center;">${renderBadge(row.earlyLeaveDays, 'warning')}</td>
                    <td style="text-align: center;">${renderBadge(row.lateAndEarlyLeaveDays, 'warning')}</td>
                    <td style="text-align: center;">${renderBadge(row.fieldLateDays, 'info')}</td>
                    <td style="text-align: center;">${renderBadge(row.fieldEarlyLeaveDays, 'info')}</td>
                    <td style="text-align: center;">${renderBadge(row.supplementCardDays, 'info')}</td>
                    <td style="text-align: center;">${renderBadge(row.compensatoryLeaveDays, 'gray')}</td>
                    <td style="text-align: center;">${renderBadge(row.totalLeaveDays, 'gray')}</td>
                    <td style="text-align: center;">
                        <span class="badge badge-danger" style="font-size: 14px; font-weight: 700;">${row.totalAbnormalDays || 0}</span>
                    </td>
                </tr>
            `).join('');
        }

        // ==================== 渲染明细表格 ====================
        function renderDetailTable(data) {
            const columns = [
                { key: 'ClockInDate', label: '日期', sortable: true },
                { key: 'userName', label: '姓名', sortable: false },
                { key: 'actualClockInTime', label: '打卡时间', sortable: false },
                { key: 'abnormalStatus', label: '异常状态', sortable: false },
                { key: 'TotalAbnormalMinutes', label: '异常分钟数', sortable: true },
                { key: 'remarkSummary', label: '备注', sortable: false }
            ];

            // 更新表头
            const thead = document.getElementById('tableHeader');
            thead.innerHTML = columns.map(col => {
                const arrow = state.sortField === col.key
                    ? (state.sortOrder === 'asc' ? ' ↑' : ' ↓')
                    : '';
                const sortableClass = col.sortable ? 'sortable' : '';
                const onclick = col.sortable ? `onclick="handleSort('${col.key}')"` : '';
                return `<th class="${sortableClass}" ${onclick}>${col.label}${arrow}</th>`;
            }).join('');

            // 渲染数据行
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(row => `
                <tr>
                    <td class="font-mono" style="font-size: 13px; font-weight: 600;">${formatChineseDate(row.clockInDate)}</td>
                    <td style="font-weight: 600;">${row.userName || '-'}</td>
                    <td class="font-mono" style="font-size: 13px;">${row.actualClockInTime || '-'}</td>
                    <td><span class="badge badge-danger">${row.abnormalStatus || '-'}</span></td>
                    <td style="text-align: center;">
                        <span class="badge badge-warning">${row.totalAbnormalMinutes || 0} 分钟</span>
                    </td>
                    <td style="font-size: 13px; color: var(--text-secondary);">${row.remarkSummary || '-'}</td>
                </tr>
            `).join('');
        }

        // ==================== 渲染徽章 ====================
        function renderBadge(value, type) {
            if (!value || value === 0) return '-';
            return `<span class="badge badge-${type}">${value}</span>`;
        }

        // ==================== 更新分页 ====================
        function updatePagination(dataCount) {
            const pagination = document.getElementById('pagination');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const currentPageEl = document.getElementById('currentPage');
            const dataCountEl = document.getElementById('dataCount');

            if (dataCount === 0) {
                pagination.classList.remove('show');
                return;
            }

            pagination.classList.add('show');
            currentPageEl.textContent = state.page;
            dataCountEl.textContent = dataCount;

            prevBtn.disabled = state.page <= 1;
            nextBtn.disabled = dataCount < state.pageSize;

        }

        // ==================== 格式化中文日期 ====================
        function formatChineseDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                return `${year}年${month}月${day}日`;
            } catch {
                return dateStr;
            }
        }
    </script>
</body>
</html>
