<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班申请查询</title>

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/dashboard-utils.js"></script>

    <style>
        /* 详情弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .info-section {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .info-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部筛选区 - 固定 -->
        <div class="filter-section">

            <div class="filter-row">
                <!-- 日期范围 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="date" id="startDate" class="form-input" style="width: 150px;">
                    <span style="color: var(--text-secondary);">至</span>
                    <input type="date" id="endDate" class="form-input" style="width: 150px;">
                </div>

                <!-- 部门 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-building" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="orgName" class="form-input" placeholder="部门名称" style="width: 160px;" value="管网产品组">
                </div>

                <!-- 申请人 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="applicant" class="form-input" placeholder="申请人姓名" style="width: 140px;">
                </div>

                <!-- 状态筛选 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-filter" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <select id="status" class="form-select" style="width: 140px;">
                        <option value="">所有状态</option>
                        <optgroup label="计划状态">
                            <option value="plan_is_pass:1">计划已通过</option>
                            <option value="plan_is_pass:0">计划已拒绝</option>
                        </optgroup>
                        <optgroup label="实际状态">
                            <option value="is_pass:1">实际已通过</option>
                            <option value="is_pass:0">实际已拒绝</option>
                        </optgroup>
                    </select>
                </div>

                <div style="flex: 1;"></div>

                <!-- 查询按钮 -->
                <button class="btn" onclick="search()" id="searchBtn">
                    <i class="fas fa-search"></i>
                    <span>查询数据</span>
                </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="display: flex; flex-direction: column;">
            <!-- 数据表格 -->
            <div class="table-container" style="position: relative; flex: 1;">
                <!-- 全屏加载遮罩 -->
                <div id="fullLoading" class="loading-overlay">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                    <p style="margin-top: 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">正在加载数据...</p>
                </div>

                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>申请人</th>
                            <th>部门</th>
                            <th>工单号</th>
                            <th>类型/地点</th>
                            <th>计划时间</th>
                            <th style="text-align: center;">计划(h)</th>
                            <th>实际时间</th>
                            <th style="text-align: center;">实际(h)</th>
                            <th style="text-align: center;">状态</th>
                            <th>审批人</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过 JS 插入 -->
                    </tbody>
                </table>

                <!-- 空状态 -->
                <div id="emptyState" style="display: none; padding: 60px 20px; text-align: center; color: var(--text-secondary);">
                    <i class="fas fa-inbox" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px;"></i>
                    <p style="font-size: 16px; font-weight: 500; margin-bottom: 8px;">暂无数据</p>
                    <p style="font-size: 14px; opacity: 0.7;">请尝试调整筛选条件</p>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <button onclick="changePage(-1)" id="prevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="pageInfo" style="font-size: 14px; color: var(--text-secondary); margin: 0 16px;">
                    第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页
                </span>
                <button onclick="changePage(1)" id="nextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modalTitle" style="font-size: 20px; font-weight: 700; margin: 0;">加班申请详情</h2>
                    <p id="modalSubtitle" style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;"></p>
                </div>
                <button class="btn btn-secondary" onclick="closeModal()" style="width: 36px; height: 36px; padding: 0; border-radius: 50%;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="info-grid" id="modalContent">
                    <!-- 内容将通过 JS 填充 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let state = {
            page: 1,
            pageSize: 30,
            total: 0
        };

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDates();
            loadData();
        });

        // ==================== 初始化日期 ====================
        function initDates() {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 6);

            document.getElementById('startDate').value = DateFormatter.format(start);
            document.getElementById('endDate').value = DateFormatter.format(end);
        }

        // ==================== 搜索 ====================
        function search() {
            state.page = 1;
            loadData();
        }

        // ==================== 翻页 ====================
        function changePage(delta) {
            const maxPage = Math.ceil(state.total / state.pageSize);
            const newPage = state.page + delta;

            if (newPage < 1 || newPage > maxPage) return;

            state.page = newPage;
            loadData();
        }

        // ==================== 加载数据 ====================
        async function loadData() {
            LoadingOverlay.show(document.querySelector('.table-container'));
            document.getElementById('emptyState').style.display = 'none';

            try {
                const payload = {
                    index: state.page,
                    size: state.pageSize,
                    startDate: document.getElementById('startDate').value ? new Date(document.getElementById('startDate').value) : null,
                    endDate: document.getElementById('endDate').value ? new Date(document.getElementById('endDate').value) : null,
                    departmentName: document.getElementById('orgName').value || null,
                    applicantName: document.getElementById('applicant').value || null,
                    status: document.getElementById('status').value || null
                };

                const response = await fetch('/api/Overtime/QueryOvertimePlan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                if (data.Code === 0 && data.Response) {
                    renderTable(data.Response.rows || []);
                    state.total = data.Response.total || 0;
                    updatePagination();
                } else {
                    throw new Error(data.Message || '数据加载失败');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败: ' + error.message);
                document.getElementById('tableBody').innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                LoadingOverlay.hide();
            }
        }

        // ==================== 渲染表格 ====================
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = data.map(item => `
                <tr onclick='showDetail(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                    <td style="font-weight: 600;">${item.user_id$$text || '-'}</td>
                    <td><span class="badge badge-gray">${item.org_id$$text || '-'}</span></td>
                    <td class="font-mono" style="font-size: 12px; color: var(--text-secondary);">${item.order_no || '-'}</td>
                    <td>
                        <div style="font-size: 14px; font-weight: 600;">${item.work_overtime_type$$text || '-'}</div>
                        <div style="font-size: 12px; color: var(--text-secondary); margin-top: 2px;">
                            <i class="fas fa-map-marker-alt" style="font-size: 10px;"></i> ${item.position$$text || '-'}
                        </div>
                    </td>
                    <td class="font-mono" style="font-size: 13px;">${formatTimeRange(item.plan_start_time, item.plan_end_time)}</td>
                    <td style="text-align: center;">
                        <span class="font-mono" style="font-weight: 700;">${item.plan_work_overtime_hour || 0}</span>
                    </td>
                    <td class="font-mono" style="font-size: 13px;">${formatTimeRange(item.start_time, item.end_time)}</td>
                    <td style="text-align: center;">
                        ${item.work_overtime_hour ? `
                            <span class="font-mono" style="font-weight: 700; color: var(--secondary-color);">${item.work_overtime_hour}</span>
                            ${item.work_overtime_hour_sub > 0 ? `<div style="font-size: 10px; color: #EF4444; margin-top: 2px;">减${item.work_overtime_hour_sub}</div>` : ''}
                        ` : '<span style="color: var(--text-secondary);">-</span>'}
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; flex-direction: column; gap: 4px; align-items: center;">
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span style="font-size: 10px; color: var(--text-secondary);">计划</span>
                                ${getStatusBadge(item.plan_is_pass)}
                            </div>
                            ${item.start_time ? `
                                <div style="display: flex; align-items: center; gap: 6px;">
                                    <span style="font-size: 10px; color: var(--text-secondary);">实际</span>
                                    ${item.is_pass ? getStatusBadge(item.is_pass) : '<span class="badge badge-gray" style="font-size: 10px;">审批中</span>'}
                                </div>
                            ` : ''}
                        </div>
                    </td>
                    <td><span class="badge badge-gray">${item.approval_user_id$$text || '-'}</span></td>
                </tr>
            `).join('');

        }

        // ==================== 格式化时间范围 ====================
        function formatTimeRange(start, end) {
            if (!start || !end) return '-';
            try {
                const s = start.replace('T', ' ').trim();
                const e = end.replace('T', ' ').trim();

                const startDate = s.split(' ')[0];
                const endDate = e.split(' ')[0];

                const startTime = (s.split(' ')[1] || '00:00').substring(0, 5);
                const endTime = (e.split(' ')[1] || '00:00').substring(0, 5);

                if (startDate === endDate) {
                    return `${startDate} ${startTime}-${endTime}`;
                } else {
                    return `${startDate} ${startTime} - ${endDate} ${endTime}`;
                }
            } catch {
                return '-';
            }
        }

        // ==================== 状态徽章 ====================
        function getStatusBadge(status) {
            if (status === "1") return '<span class="badge badge-success" style="font-size: 10px;">通过</span>';
            if (status === "0") return '<span class="badge badge-danger" style="font-size: 10px;">拒绝</span>';
            return '<span class="badge badge-gray" style="font-size: 10px;">待定</span>';
        }

        // ==================== 更新分页 ====================
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(state.total / state.pageSize);

            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            document.getElementById('currentPage').textContent = state.page;
            document.getElementById('totalPages').textContent = totalPages;

            document.getElementById('prevBtn').disabled = state.page <= 1;
            document.getElementById('nextBtn').disabled = state.page >= totalPages;
        }

        // ==================== 显示详情 ====================
        function showDetail(item) {
            document.getElementById('modalTitle').textContent = item.user_id$$text + ' - 加班申请详情';
            document.getElementById('modalSubtitle').textContent = `${item.org_id$$text} · ${item.work_overtime_type$$text}`;

            const content = `
                <div class="info-section">
                    <h3><i class="fas fa-calendar-check" style="color: var(--primary-color);"></i> 计划信息</h3>
                    <div class="info-row">
                        <span class="info-label">时间范围</span>
                        <span class="info-value font-mono">${formatTimeRange(item.plan_start_time, item.plan_end_time)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">计划时长</span>
                        <span class="info-value font-mono">${item.plan_work_overtime_hour || 0} 小时</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">加班事由</span>
                        <span class="info-value">${item.subject_matter || '无'}</span>
                    </div>
                    ${item.plan_approval_opinion ? `
                        <div class="info-row">
                            <span class="info-label">审批意见</span>
                            <span class="info-value" style="color: var(--accent-color);">${item.plan_approval_opinion}</span>
                        </div>
                    ` : ''}
                    <div class="info-row">
                        <span class="info-label">审批状态</span>
                        <span class="info-value">${getStatusBadge(item.plan_is_pass)}</span>
                    </div>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-check-circle" style="color: var(--secondary-color);"></i> 实际执行</h3>
                    ${item.start_time ? `
                        <div class="info-row">
                            <span class="info-label">实际时间</span>
                            <span class="info-value font-mono">${formatTimeRange(item.start_time, item.end_time)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">实际时长</span>
                            <span class="info-value font-mono" style="color: var(--secondary-color);">
                                ${item.work_overtime_hour || 0} 小时
                                ${item.work_overtime_hour_sub > 0 ? `<span style="color: #EF4444; font-size: 12px;">(核减 ${item.work_overtime_hour_sub}h)</span>` : ''}
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">工作内容</span>
                            <span class="info-value">${item.real_subject_matter || '无'}</span>
                        </div>
                        ${item.approval_opinion ? `
                            <div class="info-row">
                                <span class="info-label">审批意见</span>
                                <span class="info-value" style="color: var(--accent-color);">${item.approval_opinion}</span>
                            </div>
                        ` : ''}
                        ${item.is_pass ? `
                            <div class="info-row">
                                <span class="info-label">审批状态</span>
                                <span class="info-value">${getStatusBadge(item.is_pass)}</span>
                            </div>
                        ` : ''}
                    ` : `
                        <div style="padding: 40px; text-align: center; color: var(--text-secondary);">
                            <i class="far fa-clock" style="font-size: 36px; opacity: 0.3; margin-bottom: 12px;"></i>
                            <p style="font-size: 14px;">尚未填报实际加班</p>
                        </div>
                    `}
                </div>
            `;

            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('detailModal').classList.add('active');
        }

        // ==================== 关闭弹窗 ====================
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 点击背景关闭
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        // ESC 关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
