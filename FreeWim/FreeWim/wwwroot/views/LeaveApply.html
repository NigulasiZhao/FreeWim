<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>调休申请查询</title>

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/dashboard-utils.js"></script>
</head>
<body>
    <div class="page-container">
        <!-- 顶部筛选区 - 固定 -->
        <div class="filter-section">
            <div class="filter-row">
                <!-- 日期范围 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="date" id="startDate" class="form-input" style="width: 150px;">
                    <span style="color: var(--text-secondary);">至</span>
                    <input type="date" id="endDate" class="form-input" style="width: 150px;">
                </div>

                <!-- 部门 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-building" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="orgName" class="form-input" placeholder="部门名称" style="width: 160px;" value="管网产品组">
                </div>

                <!-- 申请人 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="applicant" class="form-input" placeholder="姓名" style="width: 120px;">
                </div>

                <!-- 状态筛选 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-filter" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <select id="status" class="form-select" style="width: 140px;">
                        <option value="">所有状态</option>
                        <option value="DRAFT">草稿</option>
                        <option value="PROCESS">审批中</option>
                        <option value="APPROVED">已通过</option>
                        <option value="COMPLETED">已完成</option>
                        <option value="REJECTED">已拒绝</option>
                        <option value="CANCELED">已取消</option>
                    </select>
                </div>

                <div style="flex: 1;"></div>

                <!-- 搜索按钮 -->
                <button class="btn" onclick="search()" id="searchBtn">
                    <i class="fas fa-search"></i>
                    <span>搜索</span>
                </button>

                <!-- 导出按钮 -->
                <button class="btn btn-secondary" onclick="exportData()" title="导出CSV">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="display: flex; flex-direction: column;">
            <!-- 数据表格 -->
            <div class="table-container" style="flex: 1;">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th class="sortable">申请人</th>
                            <th class="sortable">部门</th>
                            <th>工单号</th>
                            <th class="sortable">类型</th>
                            <th class="sortable">开始时间</th>
                            <th class="sortable">结束时间</th>
                            <th class="sortable" style="text-align: center;">时长(h)</th>
                            <th class="sortable" style="text-align: center;">剩余调休(h)</th>
                            <th style="text-align: center;">状态</th>
                            <th>岗位</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过 JS 插入 -->
                    </tbody>
                </table>

                <!-- 空状态 -->
                <div id="emptyState" style="display: none; padding: 60px 20px; text-align: center; color: var(--text-secondary);">
                    <i class="fas fa-inbox" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px;"></i>
                    <p style="font-size: 16px; font-weight: 500;">暂无数据</p>
                    <p style="font-size: 14px; margin-top: 8px; opacity: 0.7;">请尝试调整筛选条件</p>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination" style="display: none;">
                <button onclick="changePage(-1)" id="prevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="pageInfo" style="font-size: 14px; color: var(--text-secondary); margin: 0 16px;">
                    第 <span id="currentPage">1</span> 页，共 <span id="totalPages">1</span> 页
                </span>
                <button onclick="changePage(1)" id="nextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let currentData = [];
        let pagination = {
            current: 1,
            size: 50,
            total: 0
        };

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDates();
            loadData();

            // 初始化表格排序
            new TableSorter('dataTable');

            // 回车搜索
            document.querySelectorAll('.form-input, .form-select').forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') search();
                });
            });
        });

        // ==================== 初始化日期 ====================
        function initDates() {
            const now = new Date();
            const start = new Date(now);
            start.setDate(now.getDate() - 7);
            const end = new Date(now);
            end.setDate(now.getDate() + 7);

            document.getElementById('startDate').value = DateFormatter.format(start);
            document.getElementById('endDate').value = DateFormatter.format(end);
        }

        // ==================== 搜索 ====================
        function search() {
            pagination.current = 1;
            loadData();
        }

        // ==================== 翻页 ====================
        function changePage(delta) {
            const maxPage = Math.ceil(pagination.total / pagination.size);
            const newPage = pagination.current + delta;

            if (newPage < 1 || newPage > maxPage) return;

            pagination.current = newPage;
            loadData();
        }

        // ==================== 加载数据 ====================
        async function loadData() {
            LoadingOverlay.show(document.querySelector('.content-section'));

            try {
                const payload = {
                    index: pagination.current,
                    size: pagination.size,
                    startDate: document.getElementById('startDate').value || null,
                    endDate: document.getElementById('endDate').value || null,
                    departmentName: document.getElementById('orgName').value || null,
                    applicantName: document.getElementById('applicant').value || null,
                    status: document.getElementById('status').value || null
                };

                const response = await fetch('/api/Leave/QueryLeaveApply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                if (data.Code === 0 && data.Response) {
                    currentData = data.Response.rows || [];
                    pagination.total = data.Response.total || 0;
                    renderTable();
                    updateStats();
                    updatePagination();
                } else {
                    throw new Error(data.Message || '数据加载失败');
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败: ' + error.message);
                currentData = [];
                renderTable();
            } finally {
                LoadingOverlay.hide();
            }
        }

        // ==================== 渲染表格 ====================
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (currentData.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = currentData.map(item => `
                <tr onclick="showDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--primary-color); font-size: 14px;">
                                ${(item.user_name || '?')[0]}
                            </div>
                            <span style="font-weight: 600;">${item.user_name || '-'}</span>
                        </div>
                    </td>
                    <td>
                        <span class="badge badge-gray">${item.org_name || '-'}</span>
                    </td>
                    <td>
                        <span class="font-mono" style="font-size: 12px; color: var(--text-secondary);">${item.sn || '-'}</span>
                    </td>
                    <td>${item.leave_type$$text || '-'}</td>
                    <td class="font-mono" style="font-size: 13px;">${formatDateTime(item.leave_start_time)}</td>
                    <td class="font-mono" style="font-size: 13px;">${formatDateTime(item.leave_end_time)}</td>
                    <td style="text-align: center;">
                        <span class="font-mono" style="font-weight: 600;">${NumberFormatter.format(item.leave_hours || 0, 1)}</span>
                    </td>
                    <td style="text-align: center;">
                        <span class="font-mono" style="font-weight: 600; color: var(--secondary-color);">${NumberFormatter.format(item.tx_time || 0, 1)}</span>
                    </td>
                    <td style="text-align: center;">
                        ${getStatusBadge(item.hddev_proc_status)}
                    </td>
                    <td style="font-size: 13px; color: var(--text-secondary);">${item.job || '-'}</td>
                </tr>
            `).join('');
        }

        // ==================== 更新统计 ====================
        function updateStats() {
            // 统计卡片已移除,此函数不再需要
            // 保留函数定义以避免调用错误
        }

        // ==================== 更新分页 ====================
        function updatePagination() {
            const paginationEl = document.getElementById('pagination');
            const totalPages = Math.ceil(pagination.total / pagination.size);

            if (totalPages <= 1) {
                paginationEl.style.display = 'none';
                return;
            }

            paginationEl.style.display = 'flex';
            document.getElementById('currentPage').textContent = pagination.current;
            document.getElementById('totalPages').textContent = totalPages;

            document.getElementById('prevBtn').disabled = pagination.current <= 1;
            document.getElementById('nextBtn').disabled = pagination.current >= totalPages;
        }

        // ==================== 格式化日期时间 ====================
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            try {
                const date = new Date(dateStr);
                return DateFormatter.format(date, 'YYYY-MM-DD HH:mm');
            } catch {
                return dateStr;
            }
        }

        // ==================== 状态徽章 ====================
        function getStatusBadge(status) {
            const statusMap = {
                'APPROVED': { text: '已通过', class: 'badge-success' },
                'COMPLETED': { text: '已完成', class: 'badge-success' },
                'REJECTED': { text: '已拒绝', class: 'badge-danger' },
                'PROCESS': { text: '审批中', class: 'badge-info' },
                'DRAFT': { text: '草稿', class: 'badge-gray' },
                'CANCELED': { text: '已取消', class: 'badge-gray' }
            };

            const config = statusMap[status] || { text: status || '未知', class: 'badge-gray' };
            return `<span class="badge ${config.class}">${config.text}</span>`;
        }

        // ==================== 显示详情 ====================
        function showDetail(item) {
            const details = `
                <div style="padding: 20px;">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--text-primary);">
                        ${item.user_name} - 调休申请详情
                    </h3>

                    <div style="display: grid; gap: 16px;">
                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">部门:</span>
                            <span>${item.org_name || '-'}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">岗位:</span>
                            <span>${item.job || '-'}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">类型:</span>
                            <span>${item.leave_type$$text || '-'}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">时间范围:</span>
                            <span class="font-mono">${formatDateTime(item.leave_start_time)} 至 ${formatDateTime(item.leave_end_time)}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">时长:</span>
                            <span class="font-mono" style="font-weight: 700; color: var(--primary-color);">${NumberFormatter.format(item.leave_hours || 0, 1)} 小时</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">剩余调休:</span>
                            <span class="font-mono" style="font-weight: 700; color: var(--secondary-color);">${NumberFormatter.format(item.tx_time || 0, 1)} 小时</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">事由:</span>
                            <span>${item.leave_reason || '无'}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">状态:</span>
                            <span>${getStatusBadge(item.hddev_proc_status)}</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                            <span style="color: var(--text-secondary); font-weight: 600;">工单号:</span>
                            <span class="font-mono" style="font-size: 12px;">${item.sn || '-'}</span>
                        </div>
                    </div>
                </div>
            `;

            // 创建模态框
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(4px);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            `;

            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: white;
                border-radius: 12px;
                max-width: 600px;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
                box-shadow: var(--shadow-lg);
                position: relative;
            `;

            const closeBtn = document.createElement('button');
            closeBtn.innerHTML = '<i class="fas fa-times"></i>';
            closeBtn.className = 'btn';
            closeBtn.style.cssText = `
                position: absolute;
                top: 20px;
                right: 20px;
                width: 36px;
                height: 36px;
                padding: 0;
                border-radius: 50%;
            `;
            closeBtn.onclick = () => modal.remove();

            modalContent.innerHTML = details;
            modalContent.appendChild(closeBtn);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);

            // 点击背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });

            // ESC 关闭
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    modal.remove();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
        }

        // ==================== 导出数据 ====================
        function exportData() {
            if (currentData.length === 0) {
                Toast.warning('没有数据可导出');
                return;
            }

            TableExporter.toCSV('dataTable', `调休申请_${DateFormatter.today()}.csv`);
        }
    </script>
</body>
</html>
