<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考勤数据总览</title>

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/lib/echarts/echarts.min.js"></script>
    <script src="/js/dashboard-utils.js"></script>
</head>
<body>
    <div class="page-container">
        <!-- 内容区 - 可滚动 -->
        <div class="content-section">
            <!-- 统计卡片 -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 20px;">
                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                        <div>
                            <div class="stat-label">本月累计工时</div>
                            <div class="stat-value" id="thisMonthHours">--</div>
                        </div>
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); display: flex; align-items: center; justify-content: center; color: white;">
                            <i class="fas fa-clock" style="font-size: 20px;"></i>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; font-size: 13px;">
                        <span id="thisVsLastTrend" style="display: flex; align-items: center; gap: 4px;">
                       <i id="thisVsLastIcon" class="fas"></i>
                            <span id="thisVsLastValue">--%</span>
                        </span>
                        <span style="color: var(--text-secondary); margin-left: 8px;">较上月</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                        <div>
                            <div class="stat-label">上月累计工时</div>
                            <div class="stat-value" id="lasHours">--</div>
                        </div>
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: #DBEAFE; display: flex; align-items: center; justify-content: center; color: var(--primary-color);">
                            <i class="fas fa-history" style="font-size: 20px;"></i>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; font-size: 13px;">
                        <span id="lastVsBeforeTrend" style="display: flex; align-items: center; gap: 4px;">
                            <i id="lastVsBeforeIcon" class="fas"></i>
                            <span id="lastVsBeforeValue">--%</span>
                        </span>
                        <span style="color: var(--text-secondary); margin-left: 8px;">较上上月</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                        <div>
                            <div class="stat-label">日均工时</div>
                            <div class="stat-value" id="avgHours">--</div>
                        </div>
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: #D1FAE5; display: flex; align-items: center; justify-content: center; color: #065F46;">
                            <i class="fas fa-calendar-check" style="font-size: 20px;"></i>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; font-size: 13px;">
                        <span id="avgTrend" style="display: flex; align-items: center; gap: 4px;">
                            <i id="avgIcon" class="fas"></i>
                            <span id="avgValue">--</span>h
                        </span>
                        <span style="color: var(--text-secondary); margin-left: 8px;">较上月平均</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                        <div>
                            <div class="stat-label">本月加班率</div>
                            <div class="stat-value" id="overtimeRate">--</div>
                        </div>
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: #F3E8FF; display: flex; align-items: center; justify-content: center; color: #7C3AED;">
                            <i class="fas fa-check-circle" style="font-size: 20px;"></i>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; font-size: 13px;">
                        <span id="overtimeTrend" style="display: flex; align-items: center; gap: 4px;">
                            <i id="overtimeIcon" class="fas"></i>
                            <span id="overtimeValue">--</span>%
                        </span>
                        <span style="color: var(--text-secondary); margin-left: 8px;">较上月</span>
                    </div>
                </div>
            </div>

            <!-- 本月与上月累计工时趋势 -->
            <div class="card" style="margin-bottom: 20px;">
                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">
                    本月与上月累计工时趋势
                </h3>
                <div class="chart-container" id="monthlyTrendChart" style="height: 300px;"></div>
            </div>

            <!-- 近6个月工时总趋势和打卡时间趋势 -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <div class="card">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">
                        近6个月工时总趋势
                    </h3>
                    <div class="chart-container" id="sixMonthsTrendChart" style="height: 300px;"></div>
                </div>

                <div class="card">
                    <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">
                        打卡时间趋势
                    </h3>
                    <div class="chart-container" id="checkInOutTimeChart" style="height: 300px;"></div>
                </div>
            </div>

            <!-- 打卡热力图 -->
            <div class="card" style="margin-bottom: 20px;">
                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">
                    近一年打卡热力图
                </h3>
                <div class="chart-container" id="checkInHeatmap" style="height: 300px;"></div>
            </div>

            <!-- 加班申请列表 -->
            <div class="card">
                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text-primary);">
                    加班申请记录
                </h3>
                <div class="table-container" style="max-height: 400px;">
                    <table class="data-table" id="overtimeTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>所属项目</th>
                                <th>开始时间</th>
                                <th>结束时间</th>
                                <th style="text-align: center;">时长(h)</th>
                                <th style="text-align: center;">状态</th>
                                <th style="text-align: center;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="overtimeTableBody">
                            <!-- 数据将通过 JS 插入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 页面加载 ====================
        document.addEventListener('DOMContentLoaded', async () => {
            LoadingOverlay.show(document.querySelector('.content-section'));

            try {
                const response = await fetch('/api/AttendanceRecord/GetBoardData');
                const data = await response.json();

                initHeaderData(data);
                initMonthlyTrendChart(data.monthTrend);
                initSixMonthsTrendChart(data.monthBar);
                initCheckInOutTimeChart(data.checkIn, data.checkOut);
                initCheckInHeatmap(data.punchHeatmap);
                initOvertimeTable(data.overTimeRecord);
            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败');
            } finally {
                LoadingOverlay.hide();
            }
        });

        // ==================== 初始化统计卡片 ====================
        function initHeaderData(data) {
            // 本月工时
            document.getElementById('thisMonthHours').textContent = NumberFormatter.format(data.header.thismonth, 1);

            // 上月工时
            document.getElementById('lasHours').textContent = NumberFormatter.format(data.header.lastmonth, 1);

            // 本月 vs 上月
            const thisVsLast = data.header.thisvslastpercent || 0;
            const thisVsLastEl = document.getElementById('thisVsLastTrend');
            const thisVsLastIcon = document.getElementById('thisVsLastIcon');
            thisVsLastIcon.className = thisVsLast >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down';
            thisVsLastEl.style.color = thisVsLast >= 0 ? '#10B981' : '#EF4444';
            document.getElementById('thisVsLastValue').textContent = Math.abs(thisVsLast).toFixed(1) + '%';

            // 上月 vs 上上月
            const lastVsBefore = data.header.lastvsbeforelastpercent || 0;
            const lastVsBeforeEl = document.getElementById('lastVsBeforeTrend');
            const lastVsBeforeIcon = document.getElementById('lastVsBeforeIcon');
            lastVsBeforeIcon.className = lastVsBefore >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down';
            lastVsBeforeEl.style.color = lastVsBefore >= 0 ? '#10B981' : '#EF4444';
            document.getElementById('lastVsBeforeValue').textContent = Math.abs(lastVsBefore).toFixed(1) + '%';

            // 日均工时
            const avgThis = data.avgWorkHours.thismonth || 0;
            const avgLast = data.avgWorkHours.lastmonth || 0;
            const avgDiff = avgThis - avgLast;
            document.getElementById('avgHours').textContent = NumberFormatter.format(avgThis, 2);

            const avgTrendEl = document.getElementById('avgTrend');
            const avgIcon = document.getElementById('avgIcon');
            avgIcon.className = avgDiff >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down';
            avgTrendEl.style.color = avgDiff >= 0 ? '#10B981' : '#EF4444';
            document.getElementById('avgValue').textContent = Math.abs(avgDiff).toFixed(2);

            // 加班率
            const overtimeThis = data.avgOverTime.thismonth || 0;
            const overtimeLast = data.avgOverTime.lastmonth || 0;
            const overtimeDiff = overtimeThis - overtimeLast;
            document.getElementById('overtimeRate').textContent = NumberFormatter.format(overtimeThis, 1);

            const overtimeTrendEl = document.getElementById('overtimeTrend');
            const overtimeIcon = document.getElementById('overtimeIcon');
            overtimeIcon.className = overtimeDiff >= 0 ? 'fas fa-arrow-up' : 'fas fa-arrow-down';
            overtimeTrendEl.style.color = overtimeDiff >= 0 ? '#10B981' : '#EF4444';
            document.getElementById('overtimeValue').textContent = Math.abs(overtimeDiff).toFixed(1);
        }

        // ==================== 本月与上月累计工时趋势 ====================
        function initMonthlyTrendChart(monthTrend) {
            const chart = echarts.init(document.getElementById('monthlyTrendChart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    data: ['本月工时', '上月工时'],
                    top: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: monthTrend.labels
                },
                yAxis: {
                    type: 'value',
                    name: '工时(小时)'
                },
                series: [
                    {
                        name: '本月工时',
                        type: 'line',
                        data: monthTrend.thisMonth,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: { width: 3, color: '#3B82F6' },
                        itemStyle: { color: '#3B82F6' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                                { offset: 1, color: 'rgba(59, 130, 246, 0)' }
                            ])
                        }
                    },
                    {
                        name: '上月工时',
                        type: 'line',
                        data: monthTrend.lastMonth,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        lineStyle: { width: 3, color: '#1E40AF' },
                        itemStyle: { color: '#1E40AF' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(30, 64, 175, 0.3)' },
                                { offset: 1, color: 'rgba(30, 64, 175, 0)' }
                            ])
                        }
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 近6个月工时总趋势 ====================
        function initSixMonthsTrendChart(monthBar) {
            const chart = echarts.init(document.getElementById('sixMonthsTrendChart'));
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' }
                },
                legend: {
                    data: ['总工时', '非工作时间工时'],
                    top: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: monthBar.months,
                    axisTick: { alignWithLabel: true }
                },
                yAxis: {
                    type: 'value',
                    name: '工时(小时)'
                },
                series: [
                    {
                        name: '总工时',
                        type: 'line',
                        data: monthBar.totals,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(30, 64, 175, 0.3)' },
                                { offset: 1, color: 'rgba(30, 64, 175, 0)' }
                            ])
                        },
                        lineStyle: { color: '#1E40AF' },
                        symbol: 'circle'
                    },
                    {
                        name: '非工作时间工时',
                        type: 'line',
                        data: monthBar.overtimes,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                                { offset: 1, color: 'rgba(59, 130, 246, 0)' }
                            ])
                        },
                        lineStyle: { color: '#3B82F6' },
                        symbol: 'triangle',
                        label: {
                            show: true,
                            position: 'top',
                            formatter: (params) => {
                                const total = monthBar.totals[params.dataIndex];
                                const overtime = params.data;
                                const percent = total > 0 ? (overtime / total) * 100 : 0;
                                return `${percent.toFixed(1)}%`;
                            }
                        }
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 打卡时间趋势 ====================
        function initCheckInOutTimeChart(checkIn, checkOut) {
            const chart = echarts.init(document.getElementById('checkInOutTimeChart'));

            function timeToNumber(timeStr) {
                if (!timeStr || typeof timeStr !== 'string' || !timeStr.includes(':')) return null;
                const [h, m] = timeStr.split(':').map(Number);
                if (isNaN(h) || isNaN(m)) return null;
                return h + m / 60;
            }

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: (params) => {
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(p => {
                            const value = p.value[1];
                            const hours = Math.floor(value);
                            const minutes = Math.round((value - hours) * 60);
                            const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                            result += `${p.marker} ${p.seriesName}: ${timeStr}<br/>`;
                        });
                        return result;
                    }
                },
                legend: {
                    data: ['上班打卡', '下班打卡'],
                    top: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: checkIn.dates,
                    axisLabel: {
                        interval: 2,
                        rotate: 30,
                        formatter: (value) => value.split('.')[1] + '日'
                    }
                },
                yAxis: {
                    type: 'value',
                    min: 6,
                    max: 24,
                    interval: 3,
                    axisLabel: {
                        formatter: (value) => {
                            const hours = Math.floor(value);
                            const minutes = Math.round((value - hours) * 60);
                            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
                        }
                    },
                    splitLine: {
                        lineStyle: { type: 'dashed' }
                    }
                },
                series: [
                    {
                        name: '上班打卡',
                        type: 'line',
                        data: checkIn.dates.map((date, i) => [date, timeToNumber(checkIn.times[i])]),
                        showSymbol: true,
                        symbolSize: 12,
                        itemStyle: { color: '#1E40AF' }
                    },
                    {
                        name: '下班打卡',
                        type: 'line',
                        data: checkOut.dates.map((date, i) => [date, timeToNumber(checkOut.times[i])]),
                        showSymbol: true,
                        symbolSize: 12,
                        itemStyle: { color: '#3B82F6' }
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 打卡热力图 ====================
        function initCheckInHeatmap(data) {
            const end = new Date();
            const start = new Date();
            start.setFullYear(end.getFullYear() - 1);
            const startDate = start.toISOString().split('T')[0];
            const endDate = end.toISOString().split('T')[0];

            const chart = echarts.init(document.getElementById('checkInHeatmap'));
            const option = {
                tooltip: {
                    position: 'top',
                    formatter: (p) => `${p.data[0]}: 工时 ${p.data[1]} 小时`
                },
                visualMap: {
                    min: 0,
                    max: 13,
                    calculable: true,
                    orient: 'horizontal',
                    left: 'center',
                    bottom: 0,
                    inRange: {
                        color: ['#ebedf0', '#d6e685', '#c6e48b', '#8cc665', '#7bc96f', '#44a340', '#239a3b', '#196127']
                    }
                },
                calendar: {
                    range: [startDate, endDate],
                    cellSize: [25, 25],
                    orient: 'horizontal',
                    splitLine: {
                        show: true,
                        lineStyle: { color: '#e0e0e0', width: 1 }
                    },
                    itemStyle: {
                        borderWidth: 2,
                        borderColor: '#fff'
                    },
                    dayLabel: {
                        nameMap: 'cn',
                        fontWeight: '400',
                        color: '#666',
                        fontSize: 12
                    },
                    monthLabel: {
                        nameMap: 'cn',
                        color: '#666',
                        fontSize: 12
                    },
                    yearLabel: { show: false }
                },
                series: {
                    type: 'heatmap',
                    coordinateSystem: 'calendar',
                    data: data
                }
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // ==================== 加班申请表格 ====================
        function initOvertimeTable(data) {
            const tbody = document.getElementById('overtimeTableBody');

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-secondary);">暂无加班申请记录</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => {
                let statusBadge = '';
                let actionBtn = '';

                switch (item.status) {
                    case '已申请':
                        statusBadge = '<span class="badge badge-success">已申请</span>';
                        actionBtn = '<span style="color: var(--text-secondary); font-size: 13px;">-</span>';
                        break;
                    case '待申请':
                        statusBadge = '<span class="badge badge-warning">待申请</span>';
                        actionBtn = `<button class="btn" style="padding: 6px 12px; font-size: 12px; background: #EF4444 !important;" onclick="toggleOvertime('${item.date}', 0, this)">取消申请</button>`;
                        break;
                    case '未申请':
                        statusBadge = '<span class="badge badge-gray">未申请</span>';
                        if (item.date === new Date().toISOString().slice(0, 10)) {
                            actionBtn = `<button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="toggleOvertime('${item.date}', 1, this)">恢复申请</button>`;
                        } else {
                            actionBtn = '<span style="color: var(--text-secondary); font-size: 13px;">-</span>';
                        }
                        break;
                    default:
                        statusBadge = '<span class="badge badge-gray">未知</span>';
                        actionBtn = '<span style="color: var(--text-secondary); font-size: 13px;">-</span>';
                }

                return `
                    <tr>
                        <td class="font-mono" style="font-size: 13px;">${item.date}</td>
                        <td>${item.contractunit || '-'}</td>
                        <td class="font-mono" style="font-size: 13px;">${item.start || '-'}</td>
                        <td class="font-mono" style="font-size: 13px;">${item.end || '-'}</td>
                        <td style="text-align: center;">
                            <span class="font-mono" style="font-weight: 600;">${item.duration || 0}</span>
                        </td>
                        <td style="text-align: center;">${statusBadge}</td>
                        <td style="text-align: center;">${actionBtn}</td>
                    </tr>
                `;
            }).join('');
        }

        // ==================== 切换加班申请状态 ====================
        async function toggleOvertime(date, status, btn) {
            const tr = btn.closest('tr');
            const tds = tr.querySelectorAll('td');

            const data = {
                date: tds[0].textContent.trim(),
                contractunit: tds[1].textContent.trim(),
                start: tds[2].textContent.trim(),
                end: tds[3].textContent.trim(),
                duration: tds[4].textContent.trim(),
                status: tds[5].textContent.trim()
            };

            const endpoint = status === 0
                ? '/api/AttendanceRecord/CancelOverTimeWork'
                : '/api/AttendanceRecord/RestoreOverTimeWork';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!response.ok) throw new Error('请求失败');
                const result = await response.json();

                if (status === 0) {
                    // 取消申请
                    Toast.success('取消自动申请成功');
                    tds[5].innerHTML = '<span class="badge badge-gray">未申请</span>';
                    tds[1].textContent = '';
                    tds[2].textContent = '';
                    tds[3].textContent = '';
                    tds[4].innerHTML = '<span class="font-mono" style="font-weight: 600;">0</span>';
                    btn.textContent = '恢复申请';
                    btn.style.background = 'var(--primary-color)';
                    btn.onclick = () => toggleOvertime(date, 1, btn);
                } else {
                    // 恢复申请
                    Toast.success('恢复自动申请成功');
                    tds[5].innerHTML = '<span class="badge badge-warning">待申请</span>';
                    tds[1].textContent = '待定';
                    tds[2].textContent = result.overStartTime;
                    tds[3].textContent = result.overEndTime;
                    tds[4].innerHTML = `<span class="font-mono" style="font-weight: 600;">${result.totalHours}</span>`;
                    btn.textContent = '取消申请';
                    btn.style.background = '#EF4444';
                    btn.onclick = () => toggleOvertime(date, 0, btn);
                }
            } catch (error) {
                console.error('操作失败:', error);
                Toast.error('操作失败');
            }
        }
    </script>
</body>
</html>
