<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周末加班统计</title>

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/js/dashboard-utils.js"></script>
</head>
<body>
    <div class="page-container">
        <!-- 顶部筛选区 - 固定 -->
        <div class="filter-section">
            <div class="filter-row">
                <!-- 日期范围 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="date" id="startDate" class="form-input" style="width: 150px;">
                    <span style="color: var(--text-secondary);">至</span>
                    <input type="date" id="endDate" class="form-input" style="width: 150px;">
                </div>

                <div style="flex: 1;"></div>

                <!-- 查询按钮 -->
                <button class="btn" onclick="fetchData()" id="searchBtn">
                    <i class="fas fa-search"></i>
                    <span>查询数据</span>
                </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="display: flex; flex-direction: column;">
            <!-- 数据表格 -->
            <div class="table-container" style="position: relative; flex: 1;">
                <!-- 全屏加载遮罩 -->
                <div id="fullLoading" class="loading-overlay">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                    <p style="margin-top: 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">正在加载数据...</p>
                </div>

                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th class="sortable" onclick="handleSort('name')">
                                姓名 <span id="icon-name">↕</span>
                            </th>
                            <th class="sortable active-sort" onclick="handleSort('statisticsdate')">
                                统计日期 <span id="icon-statisticsdate">↓</span>
                            </th>
                            <th class="sortable" onclick="handleSort('signInTime')">
                                签到时间 <span id="icon-signInTime">↕</span>
                            </th>
                            <th class="sortable" onclick="handleSort('signOutTime')">
                                签退时间 <span id="icon-signOutTime">↕</span>
                            </th>
                            <th class="sortable" onclick="handleSort('hoursDiff')" style="text-align: center;">
                                加班时长(h) <span id="icon-hoursDiff">↕</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过 JS 插入 -->
                    </tbody>
                </table>

                <!-- 空状态 -->
                <div id="emptyState" style="display: none; padding: 60px 20px; text-align: center; color: var(--text-secondary);">
                    <i class="fas fa-calendar-times" style="font-size: 48px; opacity: 0.3; margin-bottom: 16px;"></i>
                    <p style="font-size: 16px; font-weight: 500; margin-bottom: 8px;">该时间段内无加班记录</p>
                    <p style="font-size: 14px; opacity: 0.7;">请尝试调整日期范围</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let state = {
            sortField: 'statisticsdate',
            sortOrder: 'desc'
        };

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDates();
            fetchData();
        });

        // ==================== 初始化日期 ====================
        function initDates() {
            const today = new Date();
            const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            const start = new Date(today.getFullYear(), today.getMonth() - 1, 1);

            document.getElementById('startDate').value = DateFormatter.format(start);
            document.getElementById('endDate').value = DateFormatter.format(end);
        }

        // ==================== 排序逻辑 ====================
        function handleSort(field) {
            if (state.sortField === field) {
                state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                state.sortField = field;
                state.sortOrder = 'desc';
            }
            updateHeaderUI();
            fetchData();
        }

        // ==================== 更新表头UI ====================
        function updateHeaderUI() {
            // 移除所有激活状态
            document.querySelectorAll('th').forEach(th => th.classList.remove('active-sort'));
            document.querySelectorAll('th span').forEach(icon => icon.textContent = '↕');

            // 添加当前排序列的激活状态
            const activeIcon = document.getElementById(`icon-${state.sortField}`);
            if (activeIcon) {
                activeIcon.closest('th').classList.add('active-sort');
                activeIcon.textContent = state.sortOrder === 'asc' ? '↑' : '↓';
            }
        }

        // ==================== 加载数据 ====================
        async function fetchData() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                Toast.warning('请选择日期范围');
                return;
            }

            LoadingOverlay.show(document.querySelector('.table-container'));
            document.getElementById('emptyState').style.display = 'none';

            try {
                const payload = {
                    startTime: startDate,
                    endTime: endDate,
                    page: 1,
                    rows: 100,
                    order: state.sortField,
                    sort: state.sortOrder
                };

                const response = await fetch('/api/AttendanceRecord/WorkingOvertimeOnWeekends', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                renderTable(data);

            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败: ' + error.message);
                document.getElementById('tableBody').innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                LoadingOverlay.hide();
            }
        }

        // ==================== 渲染表格 ====================
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (!data || data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = data.map(item => {
                const hoursClass = item.hoursDiff > 8 ? 'badge-danger' : 'badge-success';
                return `
                    <tr>
                        <td style="font-weight: 600;">${item.name || '-'}</td>
                        <td class="font-mono" style="font-size: 13px;">${item.statisticsDate || '-'}</td>
                        <td class="font-mono" style="font-size: 13px;">${formatTime(item.signInTime)}</td>
                        <td class="font-mono" style="font-size: 13px;">${formatTime(item.signOutTime)}</td>
                        <td style="text-align: center;">
                            <span class="badge ${hoursClass}" style="font-weight: 700;">${item.hoursDiff || 0} h</span>
                        </td>
                    </tr>
                `;
            }).join('');

            // 更新统计信息
            const totalHours = data.reduce((sum, item) => sum + (item.hoursDiff || 0), 0);
        }   

        // ==================== 格式化时间 ====================
        function formatTime(isoString) {
            if (!isoString) return '--:--';
            try {
                return isoString.split('T')[1].split('.')[0];
            } catch {
                return isoString;
            }
        }
    </script>
</body>

</html>
