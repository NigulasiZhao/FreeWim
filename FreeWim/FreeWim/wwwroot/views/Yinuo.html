<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用情况汇总</title>
    <script src="/js/dashboard-adapter.js"></script>
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/flatpickr/material_blue.css">
    <script src="/js/dashboard-utils.js"></script>
</head>
<body>
    <div class="page-container">
        <!-- 筛选区 - 固定顶部 -->
        <div class="filter-section">
            <div class="filter-row">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="dateRange" class="form-input" placeholder="选择日期范围" readonly style="width: 240px;">
                </div>

                <div style="flex: 1;"></div>

                <button class="btn btn-secondary" id="backBtn" onclick="initPage()" style="display: none;">
                    <i class="fas fa-arrow-left"></i>
                    <span>返回</span>
                </button>

                <button class="btn btn-primary" onclick="fetchData()">
                    <i class="fas fa-search"></i>
                    <span>查询数据</span>
                </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="display: flex; flex-direction: column;">
            <div class="table-container" style="flex: 1;">
                <div id="emptyState" class="empty-state">
                    <p>请先选择日期范围</p>
                </div>
                <div id="tableWrapper" style="display: none;">
                    <table class="data-table" id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="/lib/flatpickr/flatpickr.min.js"></script>
    <script src="/lib/flatpickr/zh.js"></script>
    <script>
        // ==================== 全局状态 ====================
        const URLS = {
            dept: '/api/PmisAndZentao/orgPage',
            user: '/api/PmisAndZentao/personPage'
        };

        let state = {
            mode: 'dept', // 'dept' or 'user'
            currentOrgId: null,
            currentRows: [],
            sortField: 'onlineRate',
            sortOrder: 'desc'
        };

        let flatpickrInstance = null;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDatePicker();
            initPage();
        });

        // ==================== 初始化日期选择器 ====================
        function initDatePicker() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);

            flatpickrInstance = flatpickr("#dateRange", {
                mode: "range",
                locale: "zh",
                dateFormat: "Y-m-d",
                defaultDate: [yesterday, yesterday]
            });
        }

        // ==================== 初始化页面 ====================
        function initPage() {
            state.mode = 'dept';
            state.sortField = 'onlineRate';
            state.sortOrder = 'desc';
            document.getElementById('backBtn').style.display = 'none';
            fetchData();
        }

        // ==================== 加载数据 ====================
        async function fetchData() {
            const dates = flatpickrInstance.selectedDates;
            if (dates.length < 1) {
                Toast.warning('请选择日期范围');
                return;
            }

            const start = flatpickrInstance.formatDate(dates[0], "Y-m-d") + " 00:00:00";
            const end = flatpickrInstance.formatDate(dates[dates.length - 1], "Y-m-d") + " 23:59:59";

            LoadingOverlay.show(document.querySelector('.table-container'));
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('tableWrapper').style.display = 'none';

            try {
                const orgIds = ["1", "2", "11", "60", "58", "53", "38", "35", "34", "14", "9", "52", "48", "32", "24", "22", "8", "56", "108", "109", "5", "80", "71", "105", "106", "3", "43", "33", "23", "15", "7", "6", "59", "57", "51", "77", "47", "46", "45", "44", "42", "41", "31", "30", "29", "26", "25", "21", "19", "18", "17", "13", "4", "49", "79", "76", "73", "69", "67", "40", "70", "39", "78", "68", "20", "72", "65", "62", "107", "104", "1762768804865126401", "1759130558729895938", "1754062725373243393", "1754063095117918209", "1840657742874861569", "1887766346995871745"];

                const payload = {
                    startTime: start,
                    endTime: end,
                    orgIds: state.mode === 'dept' ? orgIds : [state.currentOrgId]
                };

                const response = await fetch(state.mode === 'dept' ? URLS.dept : URLS.user, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const json = await response.json();
                state.currentRows = json.Response.rows || [];
                renderTable();

            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据同步失败，请检查Token效期');
                document.getElementById('emptyState').innerHTML = '<p style="color: #EF4444;">数据同步失败，请检查Token效期</p>';
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                LoadingOverlay.hide();
            }
        }

        // ==================== 切换到用户视图 ====================
        function showUser(orgId, orgName) {
            state.currentOrgId = orgId;
            state.mode = 'user';
            state.sortField = 'pcDurationH';
            state.sortOrder = 'desc';
            document.getElementById('pageTitle').textContent = orgName;
            document.getElementById('backBtn').style.display = 'inline-block';
            fetchData();
        }

        // ==================== 排序逻辑 ====================
        function handleSort(field) {
            if (state.sortField === field) {
                state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                state.sortField = field;
                state.sortOrder = 'desc';
            }
            renderTable();
        }

        // ==================== 渲染表格 ====================
        function renderTable() {
            if (!state.currentRows.length) {
                document.getElementById('emptyState').innerHTML = '<p>该时段下无相关业务数据</p>';
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('tableWrapper').style.display = 'none';
                return;
            }

            // 排序数据
            state.currentRows.sort((a, b) => {
                let v1 = a[state.sortField] ?? 0;
                let v2 = b[state.sortField] ?? 0;
                return state.sortOrder === 'asc' ? (v1 > v2 ? 1 : -1) : (v1 < v2 ? 1 : -1);
            });

            // 定义列配置
            const columns = state.mode === 'dept' ? [
                { key: 'orgNameAll', label: '部门名称', width: '200px' },
                { key: 'onlineRate', label: '上线率', width: '100px' },
                { key: 'personNum', label: '总人数', width: '100px' },
                { key: 'onlineNum', label: '上线数', width: '100px' },
                { key: 'useRate', label: '使用占比', width: '100px' },
                { key: 'sendMessageTotal', label: '消息总量', width: '100px' },
                { key: 'sendMessagePersonNum', label: '发送人数', width: '100px' },
                { key: 'staDay', label: '日期', width: '120px' }
            ] : [
                { key: 'userName', label: '姓名', width: '120px' },
                { key: 'staDay', label: '日期', width: '120px' },
                { key: 'pcDurationH', label: '时长(H)', width: '100px' },
                { key: 'sendMessageTotal', label: '消息', width: '100px' },
                { key: 'sn', label: '工号', width: '100px' },
                { key: 'appOnlineNum', label: '上线次数', width: '100px' },
                { key: 'installDesktop', label: '桌面端', width: '100px' },
                { key: 'installApp', label: '移动端', width: '100px' },
                { key: 'pcVersion', label: '桌面版本', width: '120px' },
                { key: 'nativeVersion', label: '移动版本', width: '120px' }
            ];

            // 渲染表头
            let headHtml = '<tr>';
            columns.forEach(col => {
                const sortClass = state.sortField === col.key ? (state.sortOrder === 'asc' ? 'asc' : 'desc') : '';
                headHtml += `<th class="sortable ${sortClass}" style="min-width: ${col.width};" onclick="handleSort('${col.key}')">${col.label}</th>`;
            });
            headHtml += '</tr>';
            document.getElementById('tableHead').innerHTML = headHtml;

            // 渲染表体
            let bodyHtml = '';
            state.currentRows.forEach(row => {
                const rowClick = state.mode === 'dept' ? `onclick="showUser('${row.orgId}', '${row.orgNameAll.split('>').pop()}')" style="cursor: pointer;"` : '';
                bodyHtml += `<tr ${rowClick}>`;

                columns.forEach((col, idx) => {
                    let value = row[col.key];
                    let display = value ?? '-';

                    // 特殊格式化
                    if (idx === 0) {
                        display = `<span style="font-weight: 600;">${value.split('>').pop()}</span>`;
                    } else if (col.key === 'onlineRate' || col.key === 'useRate') {
                        const percent = Number(value).toFixed(1);
                        display = `
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span>${percent}%</span>
                                <div style="width: 60px; height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden;">
                                    <div style="width: ${value}%; height: 100%; background: #1E40AF; border-radius: 3px;"></div>
                                </div>
                            </div>
                        `;
                    } else if (col.key === 'pcDurationH') {
                        display = `<span style="color: #1E40AF; font-weight: 600;">${Number(value || 0).toFixed(1)}</span>`;
                    } else if ((col.key === 'installDesktop' || col.key === 'installApp') && state.mode === 'user') {
                        display = value == 1
                            ? '<span class="badge badge-success">已安装</span>'
                            : '<span class="badge badge-secondary">未发现</span>';
                    } else if (col.key === 'sendMessageTotal' && value > 0) {
                        display = `<span style="color: #10B981; font-weight: 600;">${value}</span>`;
                    } else if (col.key === 'staDay') {
                        display = value.split(' ')[0];
                    }

                    bodyHtml += `<td>${display}</td>`;
                });
                bodyHtml += '</tr>';
            });
            document.getElementById('tableBody').innerHTML = bodyHtml;

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('tableWrapper').style.display = 'block';
        }
    </script>
</body>
</html>
