<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 统一样式和工具库 -->
    <link rel="stylesheet" href="/css/dashboard-unified.css">
    <link rel="stylesheet" href="/lib/fontawesome/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="/lib/echarts/echarts.min.js"></script>
    <script src="/js/dashboard-utils.js"></script>

    <style>
        /* 统计模式切换开关 */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* 排名徽章 */
        .rank-badge {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #E2E8F0;
            font-weight: 700;
            font-size: 14px;
            color: #64748B;
        }

        .rank-1 .rank-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .rank-2 .rank-badge {
            background: linear-gradient(135deg, #C0C0C0, #A8A8A8);
            color: white;
            box-shadow: 0 4px 12px rgba(192, 192, 192, 0.4);
        }

        .rank-3 .rank-badge {
            background: linear-gradient(135deg, #CD7F32, #B8860B);
            color: white;
            box-shadow: 0 4px 12px rgba(205, 127, 50, 0.4);
        }

        /* 表格行可点击样式 */
        .data-table tbody tr {
            cursor: pointer;
        }

        /* 底部加载指示器 */
        .load-more-indicator {
            padding: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            display: none;
        }

        .load-more-indicator.show {
            display: block;
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-secondary);
            transition: background-color 0.2s, color 0.2s;
        }

        .close-btn:hover {
            background: var(--hover-bg);
            color: var(--primary-color);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg-color);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .chart-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .detail-table-container {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .detail-table-header {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 顶部筛选区 - 固定 -->
        <div class="filter-section">

            <div class="filter-row">
                <!-- 日期范围 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-calendar-alt" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="date" id="startDate" class="form-input" style="width: 150px;">
                    <span style="color: var(--text-secondary);">至</span>
                    <input type="date" id="endDate" class="form-input" style="width: 150px;">
                </div>

                <!-- 部门 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-building" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="orgName" class="form-input" placeholder="部门名称" style="width: 160px;">
                </div>

                <!-- 用户姓名 -->
                <div style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-user" style="color: var(--text-secondary); font-size: 14px;"></i>
                    <input type="text" id="userName" class="form-input" placeholder="用户姓名" style="width: 140px;">
                </div>

                <!-- 统计模式切换 -->
                <div class="switch-container">
                    <span style="font-size: 13px; color: var(--text-secondary);">普通统计</span>
                    <label class="switch">
                        <input type="checkbox" id="advancedStatsSwitch">
                        <span class="slider"></span>
                    </label>
                    <span style="font-size: 13px; color: var(--text-secondary);">高级统计</span>
                </div>

                <div style="flex: 1;"></div>


                <!-- 查询按钮 -->
                <button class="btn" onclick="resetSearch()" id="searchBtn">
                    <i class="fas fa-search"></i>
                    <span>查询数据</span>
                </button>
            </div>
        </div>

        <!-- 内容区 - 可滚动 -->
        <div class="content-section" style="flex: 1; overflow: auto;">
            <!-- 数据表格 -->
            <div class="table-container" style="position: relative;">
                <!-- 全屏加载遮罩 -->
                <div id="fullLoading" class="loading-overlay">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                    <p style="margin-top: 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">正在分析数据...</p>
                </div>

                <table class="data-table" id="dataTable">
                    <thead>
                        <tr id="tableHeader">
                            <!-- 表头将通过 JS 动态生成 -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据行将通过 JS 插入 -->
                    </tbody>
                </table>
            </div>

            <!-- 底部加载更多指示器 -->
            <div id="bottomSentinel" class="load-more-indicator">
                <div class="spinner" style="display: inline-block; margin-right: 10px;"></div>
                <span>加载更多数据...</span>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">用户打卡详情</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <!-- Loading 遮罩 -->
                <div id="modalLoading" class="loading-overlay active">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                    <span style="margin-top: 12px; color: var(--text-secondary); font-size: 14px; font-weight: 500;">正在加载考勤数据...</span>
                </div>

                <!-- 统计卡片 -->
                <div class="stat-grid" id="statGrid">
                    <!-- JS 填充 -->
                </div>

                <!-- 图表区域 -->
                <div class="chart-section">
                    <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 600;">每日工时趋势</h3>
                    <div id="trendChart" class="chart-container"></div>
                </div>

                <!-- 详细数据表格 -->
                <div class="detail-table-container">
                    <div class="detail-table-header">每日明细</div>
                    <div style="max-height: 400px; overflow-y: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>星期</th>
                                    <th>班次/规则</th>
                                    <th style="text-align: center;">工时</th>
                                    <th style="text-align: center;">加班(h)</th>
                                    <th style="text-align: center;">状态</th>
                                </tr>
                            </thead>
                            <tbody id="detailTableBody">
                                <!-- JS 填充 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let state = {
            page: 1,
            rows: 1000,
            loading: false,
            hasMore: true,
            sortField: 'total_work_hours',
            sortOrder: 'desc',
            totalCount: 0,
            useAdvancedStats: false
        };

        let trendChart = null;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initDates();
            setupStatsToggle();
            initInfiniteScroll();
            resetSearch();
        });

        // ==================== 初始化日期 ====================
        function initDates() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 1);
            const end = new Date(now.getFullYear(), 11, 31);

            document.getElementById('startDate').value = DateFormatter.format(start);
            document.getElementById('endDate').value = DateFormatter.format(end);
        }

        // ==================== 统计方式切换 ====================
        function setupStatsToggle() {
            const switchElement = document.getElementById('advancedStatsSwitch');
            switchElement.addEventListener('change', function() {
                state.useAdvancedStats = this.checked;

                // 切换到高级统计时，将结束日期设置为昨天
                if (this.checked) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    document.getElementById('endDate').value = DateFormatter.format(yesterday);
                } else {
                    // 切换回普通统计时，恢复为年底
                    const now = new Date();
                    const end = new Date(now.getFullYear(), 11, 31);
                    document.getElementById('endDate').value = DateFormatter.format(end);
                }

                resetSearch();
            });
        }

        // ==================== 核心数据获取 ====================
        async function fetchData(isReset = false) {
            if (state.loading || (!isReset && !state.hasMore)) return;

            state.loading = true;

            const fullLoading = document.getElementById('fullLoading');
            const bottomSentinel = document.getElementById('bottomSentinel');

            if (isReset) {
                state.page = 1;
                state.hasMore = true;
                document.getElementById('tableBody').innerHTML = '';
                fullLoading.classList.add('active');
                bottomSentinel.classList.remove('show');
            } else {
                bottomSentinel.classList.add('show');
            }

            const payload = {
                startTime: document.getElementById('startDate').value,
                endTime: document.getElementById('endDate').value,
                orgName: document.getElementById('orgName').value || null,
                userName: document.getElementById('userName').value || null,
                page: state.page,
                rows: state.rows,
                order: state.sortField,
                sort: state.sortOrder
            };

            try {
                const apiUrl = state.useAdvancedStats
                    ? '/api/AttendanceRecord/AdvancedWorkHoursStatistics'
                    : '/api/AttendanceRecord/RankingOfWorkingHours';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('请求失败');

                const dataList = await response.json();

                if (state.useAdvancedStats) {
                    renderAdvancedStatsTable(dataList);
                } else {
                    renderTable(dataList);
                }

                if (dataList.length < state.rows) {
                    state.hasMore = false;
                    bottomSentinel.innerHTML = '<span>没有更多数据了</span>';
                } else {
                    state.page++;
                    bottomSentinel.innerHTML = '<div class="spinner" style="display: inline-block; margin-right: 10px;"></div><span>加载更多数据...</span>';
                }

                
            } catch (error) {
                console.error('加载数据失败:', error);
                Toast.error('数据加载失败');
            } finally {
                state.loading = false;
                fullLoading.classList.remove('active');
                if (!state.hasMore) {
                    bottomSentinel.classList.add('show');
                } else {
                    bottomSentinel.classList.remove('show');
                }
            }
        }

        // ==================== 渲染普通统计表格 ====================
        function renderTable(list) {
            const tbody = document.getElementById('tableBody');
            const fragment = document.createDocumentFragment();

            // 只在首次渲染或tbody为空时更新表头
            if (tbody.children.length === 0) {
                updateTableHeader(false);
            }

            list.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = `rank-${item.workRank}`;
                tr.addEventListener('click', () => showUserDetail(item.userId, item.userName));

                tr.innerHTML = `
                    <td style="text-align: center;"><span class="rank-badge">${item.workRank || ''}</span></td>
                    <td style="font-weight: 600;">${item.userName || ''}</td>
                    <td><span class="badge badge-gray">${item.orgName || '-'}</span></td>
                    <td class="font-mono" style="font-weight: 600; color: var(--primary-color);">${item.totalWorkHours ? item.totalWorkHours.toFixed(1) : '0.0'}</td>
                    <td style="text-align: center;">${item.workSurpassedCount || 0}</td>
                    <td style="text-align: center;">${item.workSurpassedPercent || 0}%</td>
                    <td class="font-mono" style="font-weight: 600; color: var(--accent-color);">${item.totalOvertime ? Number(item.totalOvertime).toFixed(1) : '0.0'}</td>
                    <td style="text-align: center;">${item.overtimeRank || 0}</td>
                    <td style="text-align: center;">${item.overtimeSurpassedCount || 0}</td>
                    <td style="text-align: center;">${item.overtimeSurpassedPercent || 0}%</td>
                    <td style="font-size: 13px; color: var(--text-secondary);">${item.rankDescription || ''}</td>
                `;

                fragment.appendChild(tr);
            });

            tbody.appendChild(fragment);
        }

        // ==================== 渲染高级统计表格 ====================
        function renderAdvancedStatsTable(list) {
            const tbody = document.getElementById('tableBody');
            const fragment = document.createDocumentFragment();

            // 只在首次渲染或tbody为空时更新表头
            if (tbody.children.length === 0) {
                updateTableHeader(true);
            }

            list.forEach((item, index) => {
                const rowNumber = (state.page - 1) * state.rows + index + 1;
                const tr = document.createElement('tr');
                tr.className = `rank-${rowNumber}`;
                tr.addEventListener('click', () => showUserDetail(item.userId, item.userName));

                tr.innerHTML = `
                    <td style="text-align: center;"><span class="rank-badge">${rowNumber}</span></td>
                    <td style="font-weight: 600;">${item.userName || '-'}</td>
                    <td><span class="badge badge-gray">${item.orgName || '-'}</span></td>
                    <td style="text-align: center;">${item.outDays || 0}</td>
                    <td style="text-align: center;">${item.generalLeaveDays || 0}</td>
                    <td style="text-align: center;">${item.offsetLeaveDays || 0}</td>
                    <td style="text-align: center;">${item.baseWorkingDays || 0}</td>
                    <td style="text-align: center;">${item.actualAttendanceDays || 0}</td>
                    <td class="font-mono" style="text-align: center;">${item.delayOvertimeHours ? Number(item.delayOvertimeHours).toFixed(1) : '0.0'}</td>
                    <td class="font-mono" style="text-align: center;">${item.weekendOvertimeHours ? Number(item.weekendOvertimeHours).toFixed(1) : '0.0'}</td>
                    <td class="font-mono" style="text-align: center; font-weight: 600; color: var(--accent-color);">${item.totalOvertimeHours ? Number(item.totalOvertimeHours).toFixed(1) : '0.0'}</td>
                    <td class="font-mono" style="text-align: center; font-weight: 600; color: var(--primary-color);">${item.totalActualWorkHours ? Number(item.totalActualWorkHours).toFixed(1) : '0.0'}</td>
                    <td class="font-mono" style="text-align: center;">${item.dailyAvgWorkHours ? Number(item.dailyAvgWorkHours).toFixed(1) : '0.0'}</td>
                `;

                fragment.appendChild(tr);
            });

            tbody.appendChild(fragment);
        }

        // ==================== 更新表头 ====================
        function updateTableHeader(isAdvanced) {
            const thead = document.getElementById('tableHeader');
            if (isAdvanced) {
                thead.innerHTML = `
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_actual_work_hours')">排名</th>
                    <th class="sortable" onclick="changeSort('user_name')">姓名</th>
                    <th class="sortable" onclick="changeSort('org_name')">部门</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('out_days')">出差天数</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('general_leave_days')">请假天数</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('offset_leave_days')">调休天数</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('base_working_days')">实际出勤天数</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('actual_attendance_days')">实际工作天数</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('delay_overtime_hours')">非周末加班</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('weekend_overtime_hours')">周末加班</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_overtime_hours')">加班时长</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_actual_work_hours')">实际工作工时</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('daily_avg_work_hours')">日均实际工时</th>
                `;
            } else {
                thead.innerHTML = `
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_work_hours')">排名</th>
                    <th class="sortable" onclick="changeSort('user_name')">姓名</th>
                    <th class="sortable" onclick="changeSort('org_name')">部门</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_work_hours')">总工时</th>
                    <th style="text-align: center;">超越人数</th>
                    <th style="text-align: center;">超越比例</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('total_overtime')">加班工时</th>
                    <th class="sortable" style="text-align: center;" onclick="changeSort('overtime_rank')">加班排名</th>
                    <th style="text-align: center;">加班超越人数</th>
                    <th style="text-align: center;">加班超越比例</th>
                    <th>详细描述</th>
                `;
            }
        }

        // ==================== 排序逻辑 ====================
        function changeSort(field) {
            if (state.sortField === field) {
                state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                state.sortField = field;
                state.sortOrder = 'desc';
            }
            resetSearch();
        }

        // ==================== 重置/重新查询 ====================
        function resetSearch() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            fetchData(true);
        }

        // ==================== Infinite Scroll 监听器 ====================
        function initInfiniteScroll() {
            const sentinel = document.getElementById('bottomSentinel');
            const scrollContainer = document.querySelector('.content-section');

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !state.loading && state.hasMore) {
                    fetchData(false);
                }
            }, {
                root: scrollContainer,  // 指定滚动容器
                rootMargin: '200px',
                threshold: 0.1
            });

            observer.observe(sentinel);
        }

        // ==================== 详情弹窗逻辑 ====================
        async function showUserDetail(userId, userName) {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const tbody = document.getElementById('detailTableBody');
            const statGrid = document.getElementById('statGrid');
            const loading = document.getElementById('modalLoading');

            title.textContent = userName + ' - 考勤详情';
            statGrid.innerHTML = '';
            tbody.innerHTML = '';

            modal.classList.add('active');
            loading.classList.add('active');

            if (trendChart) {
                trendChart.dispose();
                trendChart = null;
            }

            try {
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;

                const response = await fetch('/api/AttendanceRecord/GetUserClockInDetails', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        userName: userName,
                        startTime: startDate,
                        endTime: endDate
                    })
                });

                if (!response.ok) throw new Error('请求失败');
                const data = await response.json();

                renderStats(data);
                renderDetailTable(data);
                initCharts(data);

            } catch (error) {
                console.error('加载详情失败:', error);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: #EF4444; padding: 20px;">加载失败</td></tr>';
                Toast.error('加载详情失败');
            } finally {
                loading.classList.remove('active');
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        // ==================== 渲染统计卡片 ====================
        function renderStats(data) {
            if (!data || data.length === 0) return;

            let totalHours = 0;
            let totalOvertime = 0;
            let clockInDays = 0;

            data.forEach(d => {
                const hours = d.workHours || 0;
                if (hours > 0) {
                    clockInDays++;
                    totalHours += hours;
                    totalOvertime += (d.workOvertime || 0);
                }
            });

            const avgHours = clockInDays > 0 ? (totalHours / clockInDays).toFixed(1) : 0;
            const totalOvertimeHours = (totalOvertime / 60).toFixed(1);

            const stats = [
                { label: '打卡天数', value: clockInDays + '天', icon: '📅' },
                { label: '总工时', value: totalHours.toFixed(1) + 'h', icon: '⏱️' },
                { label: '日均工时', value: avgHours + 'h', icon: '📊' },
                { label: '总加班', value: totalOvertimeHours + 'h', icon: '🌙' }
            ];

            const html = stats.map(s => `
                <div class="stat-card">
                    <div style="font-size: 20px; margin-bottom: 8px;">${s.icon}</div>
                    <div class="stat-value">${s.value}</div>
                    <div class="stat-label">${s.label}</div>
                </div>
            `).join('');

            document.getElementById('statGrid').innerHTML = html;
        }

        // ==================== 渲染详细表格 ====================
        function renderDetailTable(data) {
            const tbody = document.getElementById('detailTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color: var(--text-secondary);">无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(row => {
                let statusHtml = '';
                if (row.isRest === '1') {
                    statusHtml = '<span class="badge badge-gray">休息</span>';
                } else if (row.isAbsenteeism === '1') {
                    statusHtml = '<span class="badge badge-danger">旷工</span>';
                } else {
                    const badges = [];
                    if (row.isLate === '1') badges.push('<span class="badge badge-danger">迟到</span>');
                    if (row.isEarly === '1') badges.push('<span class="badge badge-danger">早退</span>');
                    if (row.isOut === '1') badges.push('<span class="badge badge-info">出差</span>');
                    statusHtml = badges.length > 0 ? badges.join(' ') : '<span class="badge badge-success">正常</span>';
                }

                const overtimeHours = row.workOvertime ? (row.workOvertime / 60).toFixed(1) : '-';

                return `
                    <tr>
                        <td class="font-mono" style="font-size: 13px;">${row.clockInDate || ''}</td>
                        <td>${row.dayOfWeek || ''}</td>
                        <td style="font-size: 13px;">${row.checkInRule || '-'}</td>
                        <td style="text-align: center;">
                            <span class="font-mono" style="font-weight: 600; color: var(--primary-color);">${row.workHours ? row.workHours.toFixed(1) : '-'}</span>
                        </td>
                        <td style="text-align: center;">
                            <span class="font-mono" style="font-weight: 600; color: ${row.workOvertime > 0 ? 'var(--accent-color)' : 'var(--text-secondary)'};">${overtimeHours}</span>
                        </td>
                        <td style="text-align: center;">${statusHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        // ==================== 初始化图表 ====================
        function initCharts(data) {
            const trendDom = document.getElementById('trendChart');
            trendChart = echarts.init(trendDom);

            const chartData = [...data].reverse();
            const dates = chartData.map(d => d.clockInDate.slice(5));
            const hours = chartData.map(d => d.workHours || 0);
            const overtimes = chartData.map(d => (d.workOvertime / 60).toFixed(1) || 0);

            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['工时', '加班(小时)'], bottom: 0 },
                grid: { left: '3%', right: '4%', bottom: '12%', containLabel: true, top: '5%' },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisTick: { alignWithLabel: true },
                    axisLabel: { interval: 2, rotate: 30 }
                },
                yAxis: { type: 'value', name: '小时' },
                series: [
                    {
                        name: '工时',
                        type: 'bar',
                        data: hours,
                        barMaxWidth: 30,
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#3B82F6' },
                                { offset: 1, color: '#1E40AF' }
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        }
                    },
                    {
                        name: '加班(小时)',
                        type: 'line',
                        data: overtimes,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 6,
                        itemStyle: { color: '#F59E0B' },
                        lineStyle: { width: 3 },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(245, 158, 11, 0.3)' },
                                { offset: 1, color: 'rgba(245, 158, 11, 0)' }
                            ])
                        }
                    }
                ]
            });

            window.addEventListener('resize', () => {
                trendChart && trendChart.resize();
            });
        }
    </script>
</body>
</html>
