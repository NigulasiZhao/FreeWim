<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工时排行榜</title>
    <script src="/lib/echarts/echarts.min.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --glass-bg: rgba(255, 255, 255, 0.85); /* 更不透明一点，增强可读性 */
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --card-radius: 16px;
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        /* 开关样式 */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--ios-blue);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            /* 更加细腻的深色动态背景 */
            background-image:
                radial-gradient(at 10% 10%, hsla(253,16%,7%,0.05) 0, transparent 50%),
                radial-gradient(at 90% 90%, hsla(220,39%,30%,0.05) 0, transparent 50%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            overflow-y: scroll; /* 保持滚动条 */
        }

        /* 装饰球 */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
        }
        .blob-1 { top: -100px; left: -100px; width: 500px; height: 500px; background: #a1c4fd; animation: float 15s infinite; }
        .blob-2 { bottom: -100px; right: -100px; width: 600px; height: 600px; background: #c2e9fb; animation: float 20s infinite reverse; }
        @keyframes float { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, 50px); } }

        .container {
            width: 95%; /* 页面变宽 */
            max-width: 1600px; /*在大屏上限制最大宽度 */
            margin: 0 auto;
        }

        /* --- 顶部筛选栏 --- */
        .control-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 20px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 20px;
            position: sticky;
            top: 20px;
            z-index: 100; /* 保证筛选栏在滚动时在最上层 */
        }

        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        h1 { font-size: 22px; font-weight: 700; margin: 0; }

        /* 统计小字 */
        .data-summary { font-size: 13px; color: var(--text-secondary); }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* 响应式Grid */
            gap: 12px;
            align-items: end;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
            margin-left: 4px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.08);
            background: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            transition: all 0.2s;
        }
        .input-group input:focus { background: #fff; box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); outline: none; border-color: var(--ios-blue); }

        .search-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            height: 40px;
            transition: all 0.2s;
        }
        .search-btn:active { transform: scale(0.97); }

        /* --- 表格区域 --- */
        .table-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden; /* 包含遮罩层 */
            position: relative;
            min-height: 300px; /* 防止初始加载高度太小 */
        }

        /* 遮罩层 Loading (用于第一页加载) */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .loading-overlay.active { opacity: 1; pointer-events: all; }

        .table-scroll {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px; /* 保证最小宽度，防止内容挤压 */
        }

        thead {
            background: rgba(240, 240, 245, 0.5);
            position: sticky;
            top: 0; /* 表头粘性定位 (相对于table-scroll) */
        }

        th {
            text-align: left;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        th:hover { color: var(--ios-blue); background: rgba(0,0,0,0.02); }

        td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            vertical-align: top; /* 顶部对齐，适应长文本换行 */
            line-height: 1.5;
        }

        tr:last-child td { border-bottom: none; }

        /* 列样式 */
        .col-rank { text-align: center; width: 60px; }
        .col-num { font-family: "SF Mono", monospace; font-weight: 600; }
        .col-blue { color: var(--ios-blue); }
        .col-orange { color: #FF9500; }

        /* 关键修改：描述列允许换行，并给足宽度 */
        .col-desc {
            min-width: 350px;
            white-space: normal; /* 允许换行 */
            color: #555;
            font-size: 13px;
        }

        .rank-badge {
            display: inline-flex; width: 28px; height: 28px;
            align-items: center; justify-content: center;
            border-radius: 50%; background: #e5e5ea;
            font-weight: 700; font-size: 12px; color: #666;
        }
        .rank-1 .rank-badge { background: #FFD700; color: #fff; box-shadow: 0 2px 5px rgba(255, 215, 0, 0.4); }
        .rank-2 .rank-badge { background: #C0C0C0; color: #fff; }
        .rank-3 .rank-badge { background: #CD7F32; color: #fff; }

        /* 底部加载更多指示器 */
        .load-more-indicator {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .load-more-indicator.show { opacity: 1; }

        /* Spinner 动画 */
        .spinner {
            width: 24px; height: 24px;
            border: 2.5px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--ios-blue);
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 移动端调整 */
        @media (max-width: 768px) {
            .container { width: 100%; padding: 0 10px; }
            .control-panel { position: static; margin-top: 10px; padding: 16px; }
            .filter-grid { grid-template-columns: 1fr 1fr; }
            .search-btn { grid-column: span 2; }
            h1 { display: none; } /* 移动端为了省空间隐藏标题 */
        }
        /* --- 详情弹窗 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); /* 加深遮罩 */
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }

        .modal-content {
            background: #fff; /* 纯白背景，去除毛玻璃 */
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            border-radius: 12px; /* 减小圆角 */
            box-shadow: 0 24px 48px rgba(0,0,0,0.15); /* 更柔和的阴影 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.98);
            transition: transform 0.2s;
            position: relative;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            z-index: 10;
        }
        .modal-title { font-size: 18px; font-weight: 600; color: #1c1c1e; }
        .close-btn {
            background: transparent;
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #8e8e93;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #1c1c1e; background: #f2f2f7; }

        .modal-body {
            flex: 1;
            overflow-y: auto; /* 统一滚动 */
            padding: 24px;
            background: #f5f5f7; /* 浅灰底色区分内容 */
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative; /* 为 loading 定位 */
        }

        .modal-loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            backdrop-filter: blur(2px);
        }
        .modal-loading.active { opacity: 1; pointer-events: all; }

        .chart-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e5ea; /* 边框替代阴影 */
            box-shadow: none;
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .detail-table-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            box-shadow: none;
        }

        .table-scroll-area {
            width: 100%;
            overflow-x: hidden; /* 禁止横向滚动 */
        }

        .detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .detail-table th {
            background: #f9f9f9;
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            color: #8e8e93;
            font-weight: 600;
            border-bottom: 1px solid #e5e5ea;
            position: sticky; /* 表头固定 */
            top: 0;
            z-index: 10;
        }
        .detail-table td {
            padding: 12px 16px;
            font-size: 14px;
            color: #1c1c1e;
            border-bottom: 1px solid #f2f2f7;
            white-space: normal; /* 允许换行 */
            word-break: break-word; /* 防止长单词撑开 */
            vertical-align: top;
        }
        .detail-table tr:last-child td { border-bottom: none; }

        /* 统计卡片样式 - 简化 */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            box-shadow: none; /* 去除阴影 */
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* 左对齐更像Admin风格 */
        }
        .stat-value { font-size: 22px; font-weight: 700; color: #1C1C1E; margin: 4px 0; font-family: "SF Pro Display", sans-serif; }
        .stat-label { font-size: 12px; color: #8e8e93; display: flex; align-items: center; gap: 4px; }
        .stat-icon { font-size: 16px; }

        @media (max-width: 768px) {
            .stat-grid { grid-template-columns: 1fr 1fr; }
        }
        .tag {
            padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500;
        }
        .tag-normal { background: #e8f5e9; color: #2e7d32; }
        .tag-late { background: #ffebee; color: #c62828; }
        .tag-overtime { background: #fff3e0; color: #ef6c00; }

        tr.cursor-pointer { cursor: pointer; transition: background 0.2s; }
        tr.cursor-pointer:hover { background: rgba(0, 122, 255, 0.05); }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        
        <div class="control-panel">
            <div class="filter-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h1>工时排行榜</h1>
                    <div class="switch-container" style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 12px; color: var(--text-secondary);">普通统计</span>
                        <label class="switch">
                            <input type="checkbox" id="advancedStatsSwitch">
                            <span class="slider"></span>
                        </label>
                        <span style="font-size: 12px; color: var(--text-secondary);">高级统计</span>
                    </div>
                </div>
                <span class="data-summary" id="dataSummary">加载中...</span>
            </div>
            <div class="filter-grid">
                <div class="input-group">
                    <label>开始日期</label>
                    <input type="date" id="startDate">
                </div>
                <div class="input-group">
                    <label>结束日期</label>
                    <input type="date" id="endDate">
                </div>
                <div class="input-group">
                    <label>部门名称</label>
                    <input type="text" id="orgName" placeholder="部门筛选">
                </div>
                <div class="input-group">
                    <label>用户姓名</label>
                    <input type="text" id="userName" placeholder="姓名筛选">
                </div>
                <button class="search-btn" onclick="resetSearch()">查询数据</button>
            </div>
        </div>

        <div class="table-wrapper">
            <div id="fullLoading" class="loading-overlay">
                <div class="spinner" style="width: 40px; height: 40px; border-width: 4px;"></div>
                <p style="margin-top: 10px; color: #666; font-size: 14px;">正在分析数据...</p>
            </div>

            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="col-rank" onclick="changeSort('total_work_hours')">排名 ↕</th>
                            <th onclick="changeSort('user_name')">姓名 ↕</th>
                            <th onclick="changeSort('org_name')">部门 ↕</th>
                            <th onclick="changeSort('total_work_hours')">总工时 ↕</th>
                            <th>超越人数</th>
                            <th>超越比例</th>
                            <th onclick="changeSort('total_overtime')">加班工时 ↕</th>
                            <th onclick="changeSort('overtime_rank')">加班排名 ↕</th>
                            <th>加班超越人数</th>
                            <th>加班超越比例</th>
                            <th class="col-desc">详细描述</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>

            <div id="bottomSentinel" class="load-more-indicator">
                <div class="spinner"></div>
                <span>加载更多数据...</span>
            </div>
        </div>
        
        <div style="height: 40px;"></div>
    </div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">用户打卡详情</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <!-- Loading 遮罩 -->
                <div id="modalLoading" class="modal-loading">
                    <div class="spinner" style="width: 40px; height: 40px; border-width: 4px; border-top-color: var(--ios-blue);"></div>
                    <span style="margin-top: 10px; color: #666; font-size: 14px; font-weight: 500;">正在分析考勤数据...</span>
                </div>

                <!-- 统计卡片 -->
                <div class="stat-grid" id="statGrid">
                    <!-- JS 填充 -->
                </div>

                <!-- 图表区域 -->
                <div class="chart-section">
                    <h3 style="margin-bottom: 15px; font-size: 16px; font-weight: 600;">每日工时趋势</h3>
                    <div id="trendChart" class="chart-container"></div>
                </div>

                <!-- 详细数据表格 -->
                <div class="detail-table-container">
                    <div style="padding: 16px 20px; font-size: 15px; font-weight: 600; border-bottom: 1px solid #e5e5ea;">每日明细</div>
                    <div class="table-scroll-area">
                        <table class="detail-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>星期</th>
                                    <th>班次/规则</th>
                                    <th>工时</th>
                                    <th>加班(小时)</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="detailTableBody">
                                <!-- JS 填充 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- 全局状态 ---
    let state = {
        page: 1,
        rows: 100, // 每次加载20条，方便演示分页
        loading: false,
        hasMore: true,
        sortField: 'total_work_hours',
        sortOrder: 'desc',
        totalCount: 0,
        useAdvancedStats: false // 新增：是否使用高级统计
    };

    // --- 初始化日期 ---
    function initDates() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 1);
        const end = new Date(now.getFullYear(), 11, 31);

        const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        document.getElementById('startDate').value = fmt(start);
        document.getElementById('endDate').value = fmt(end);
    }

    // --- 统计方式切换 ---
    function setupStatsToggle() {
        const switchElement = document.getElementById('advancedStatsSwitch');
        switchElement.addEventListener('change', function() {
            state.useAdvancedStats = this.checked;

            // 如果切换到高级统计，将结束日期设置为昨天
            if (this.checked) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                document.getElementById('endDate').value = fmt(yesterday);
            } else {
                // 切换回普通统计时，恢复为年底
                const now = new Date();
                const end = new Date(now.getFullYear(), 11, 31);
                const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                document.getElementById('endDate').value = fmt(end);
            }

            resetSearch(); // 切换统计方式时重新查询
        });
    }

    // --- 核心数据获取 ---
    async function fetchData(isReset = false) {
        if (state.loading || (!isReset && !state.hasMore)) return;

        state.loading = true;

        // UI 状态控制
        const fullLoading = document.getElementById('fullLoading');
        const bottomSentinel = document.getElementById('bottomSentinel');

        if (isReset) {
            state.page = 1;
            state.hasMore = true;
            document.getElementById('tableBody').innerHTML = ''; // 重置时清空
            fullLoading.classList.add('active'); // 显示全屏Loading
            bottomSentinel.classList.remove('show');
        } else {
            bottomSentinel.classList.add('show'); // 显示底部Loading
        }

        const payload = {
            startTime: document.getElementById('startDate').value,
            endTime: document.getElementById('endDate').value,
            orgName: document.getElementById('orgName').value || null,
            userName: document.getElementById('userName').value || null,
            page: state.page,
            rows: state.rows,
            order: state.sortField,
            sort: state.sortOrder
        };

        try {
            // 模拟网络延迟 600ms，体验”丝滑”
            await new Promise(r => setTimeout(r, 600));

            let dataList = [];

            // 尝试真实请求
            try {
                const apiUrl = state.useAdvancedStats
                    ? '/api/AttendanceRecord/AdvancedWorkHoursStatistics'
                    : '/api/AttendanceRecord/RankingOfWorkingHours';

                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    dataList = await res.json();
                } else {
                    throw new Error("API Fail");
                }
            } catch (e) {
                console.log("使用Mock数据演示分页");
            }

            // 根据统计方式渲染不同的表格
            if (state.useAdvancedStats) {
                renderAdvancedStatsTable(dataList);
            } else {
                renderTable(dataList);
            }

            // 更新状态
            if (dataList.length < state.rows) {
                state.hasMore = false;
                bottomSentinel.innerHTML = '<span>没有更多数据了</span>';
            } else {
                state.page++;
                // 恢复 Sentinel 原始状态
                bottomSentinel.innerHTML = '<div class="spinner"></div><span>加载更多数据...</span>';
            }

            // 更新总数显示 (模拟)
            document.getElementById('dataSummary').innerText = `当前展示前 ${(state.page-1) * state.rows} 名`;

        } catch (err) {
            console.error(err);
        } finally {
            state.loading = false;
            fullLoading.classList.remove('active'); // 隐藏全屏Loading
            if (!state.hasMore) {
                 bottomSentinel.classList.add('show'); // 保持显示”没有更多”
            } else {
                 bottomSentinel.classList.remove('show'); // 隐藏Loading条，等待下次滚动
            }
        }
    }

    // --- 渲染普通统计表格 ---
    function renderTable(list) {
        const tbody = document.getElementById('tableBody');
        const fragment = document.createDocumentFragment();

        // 更新表头
        updateTableHeader(false);

        list.forEach(item => {
            const tr = document.createElement('tr');
            tr.className = `rank-${item.workRank} cursor-pointer`;
            // 点击查看详情
            tr.addEventListener('click', () => showUserDetail(item.userId, item.userName));

            const rowHTML = '<td class="col-rank"><span class="rank-badge">' + (item.workRank || '') + '</span></td>' +
                '<td>' + (item.userName || '') + '</td>' +
                '<td style="font-size:13px; color:#666;">' + (item.orgName || '-') + '</td>' +
                '<td class="col-num col-blue">' + (item.totalWorkHours ? item.totalWorkHours.toFixed(1) : '0.0') + '</td>' +
                '<td>' + (item.workSurpassedCount || 0) + '</td>' +
                '<td>' + (item.workSurpassedPercent || 0) + '%</td>' +
                '<td class="col-num col-orange">' + (item.totalOvertime ? Number(item.totalOvertime).toFixed(1) : '0.0') + '</td>' +
                '<td style="text-align:center">' + (item.overtimeRank || 0) + '</td>' +
                '<td>' + (item.overtimeSurpassedCount || 0) + '</td>' +
                '<td>' + (item.overtimeSurpassedPercent || 0) + '%</td>' +
                '<td class="col-desc">' + (item.rankDescription || '') + '</td>';

            tr.innerHTML = rowHTML;
            fragment.appendChild(tr);
        });

        tbody.appendChild(fragment);
    }

    // --- 渲染高级统计表格 ---
    function renderAdvancedStatsTable(list) {
        const tbody = document.getElementById('tableBody');
        const fragment = document.createDocumentFragment();

        // 更新表头
        updateTableHeader(true);

        list.forEach((item, index) => {
            // 计算序号：(当前页-1) * 每页条数 + 当前索引 + 1
            const rowNumber = (state.page - 1) * state.rows + index + 1;

            const tr = document.createElement('tr');
            // 为前三名添加特殊样式类，与普通统计保持一致
            tr.className = 'rank-' + rowNumber + ' cursor-pointer';
            // 点击查看详情
            tr.addEventListener('click', () => showUserDetail(item.userId, item.userName));

            const rowHTML = '<td class="col-rank"><span class="rank-badge">' + rowNumber + '</span></td>' +
                '<td>' + (item.userName || '-') + '</td>' +
                '<td style="font-size:13px; color:#666;">' + (item.orgName || '-') + '</td>' +
                '<td>' + (item.outDays || 0) + '</td>' +
                '<td>' + (item.generalLeaveDays || 0) + '</td>' +
                '<td>' + (item.offsetLeaveDays || 0) + '</td>' +
                '<td>' + (item.baseWorkingDays || 0) + '</td>' +
                '<td>' + (item.actualAttendanceDays || 0) + '</td>' +
                '<td>' + (item.delayOvertimeHours ? Number(item.delayOvertimeHours).toFixed(1) : 0) + '</td>' +
                '<td>' + (item.weekendOvertimeHours ? Number(item.weekendOvertimeHours).toFixed(1) : 0) + '</td>' +
                '<td>' + (item.totalOvertimeHours ? Number(item.totalOvertimeHours).toFixed(1) : 0) + '</td>' +
                '<td class="col-num col-blue">' + (item.totalActualWorkHours ? Number(item.totalActualWorkHours).toFixed(1) : 0) + '</td>' +
                '<td class="col-num">' + (item.dailyAvgWorkHours ? Number(item.dailyAvgWorkHours).toFixed(1) : 0) + '</td>';

            tr.innerHTML = rowHTML;
            fragment.appendChild(tr);
        });

        tbody.appendChild(fragment);
    }

    // --- 更新表头 ---
    function updateTableHeader(isAdvanced) {
        const thead = document.querySelector('thead tr');
        if (isAdvanced) {
            thead.innerHTML =
                '<th class="col-rank" onclick="changeSort(\'total_actual_work_hours\')">排名</th>' +
                '<th onclick="changeSort(\'user_name\')">姓名 ↕</th>' +
                '<th onclick="changeSort(\'org_name\')">部门 ↕</th>' +
                '<th onclick="changeSort(\'out_days\')">出差天数 ↕</th>' +
                '<th onclick="changeSort(\'general_leave_days\')">请假天数 ↕</th>' +
                '<th onclick="changeSort(\'offset_leave_days\')">调休天数 ↕</th>' +
                '<th onclick="changeSort(\'base_working_days\')">实际出勤天数 ↕</th>' +
                '<th onclick="changeSort(\'actual_attendance_days\')">实际工作天数 ↕</th>' +
                '<th onclick="changeSort(\'delay_overtime_hours\')">非周末加班 ↕</th>' +
                '<th onclick="changeSort(\'weekend_overtime_hours\')">周末加班 ↕</th>' +
                '<th onclick="changeSort(\'total_overtime_hours\')">加班时长 ↕</th>' +
                '<th onclick="changeSort(\'total_actual_work_hours\')">实际工作工时 ↕</th>' +
                '<th onclick="changeSort(\'daily_avg_work_hours\')">日均实际工时 ↕</th>';
        } else {
            thead.innerHTML = '<th class="col-rank" onclick="changeSort(\'total_work_hours\')">排名 ↕</th>' +
                '<th onclick="changeSort(\'user_name\')">姓名 ↕</th>' +
                '<th onclick="changeSort(\'org_name\')">部门 ↕</th>' +
                '<th onclick="changeSort(\'total_work_hours\')">总工时 ↕</th>' +
                '<th>超越人数</th>' +
                '<th>超越比例</th>' +
                '<th onclick=”changeSort(\'total_overtime\')”>加班工时 ↕</th>' +
                '<th onclick=”changeSort(\'overtime_rank\')”>加班排名 ↕</th>' +
                '<th>加班超越人数</th>' +
                '<th>加班超越比例</th>' +
                '<th class=”col-desc”>详细描述</th>';
        }
    }

    // --- 排序逻辑 ---
    function changeSort(field) {
        if (state.sortField === field) {
            state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
        } else {
            state.sortField = field;
            state.sortOrder = 'desc';
        }
        resetSearch();
    }

    // --- 重置/重新查询 ---
    function resetSearch() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        fetchData(true);
    }

    // --- Infinite Scroll 监听器 ---
    function initInfiniteScroll() {
        const sentinel = document.getElementById('bottomSentinel');

        const observer = new IntersectionObserver((entries) => {
            // 当底部元素进入视口，且没有正在加载，且还有更多数据时
            if (entries[0].isIntersecting && !state.loading && state.hasMore) {
                fetchData(false); // 加载下一页
            }
        }, {
            rootMargin: '200px', // 提前200px触发，体验更无缝
            threshold: 0.1
        });

        observer.observe(sentinel);
    }

    // --- 详情弹窗逻辑 ---
    let trendChart = null;

    async function showUserDetail(userId, userName) {
        // 显示Loading或打开弹窗
        const modal = document.getElementById('detailModal');
        const title = document.getElementById('modalTitle');
        const tbody = document.getElementById('detailTableBody');
        const statGrid = document.getElementById('statGrid');
        const loading = document.getElementById('modalLoading');

        title.innerText = userName + ' - 考勤详情';
        // tbody.innerHTML = '<tr><td colspan=”6” style=”text-align:center; padding: 20px;”>加载中...</td></tr>'; // 移除旧Loading
        // statGrid.innerHTML = ''; // 可选：保留旧数据直到新数据加载完成，或者清空。为了避免误导，清空较好。
        statGrid.innerHTML = '';
        tbody.innerHTML = '';

        modal.classList.add('active');
        loading.classList.add('active'); // 显示新Loading

        // 销毁旧图表
        if(trendChart) { trendChart.dispose(); trendChart = null; }

        try {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            // 模拟延迟，让Loading展示一会
            await new Promise(r => setTimeout(r, 500));

            const res = await fetch('/api/AttendanceRecord/GetUserClockInDetails', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    userName: userName,
                    startTime: startDate,
                    endTime: endDate
                })
            });

            if(!res.ok) throw new Error("Fetch Error");
            const data = await res.json();

            renderStats(data);
            renderDetailTable(data);
            initCharts(data);

        } catch(e) {
            console.error(e);
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: red; padding: 20px;">加载失败</td></tr>';
        } finally {
            loading.classList.remove('active'); // 隐藏Loading
        }
    }

    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
    }

    // 点击遮罩关闭
    document.getElementById('detailModal').addEventListener('click', (e) => {
        if(e.target.id === 'detailModal') closeModal();
    });

    function renderStats(data) {
        if(!data || data.length === 0) return;

        // 计算统计数据
        let totalHours = 0;
        let totalOvertime = 0; // 分钟
        let clockInDays = 0;

        data.forEach(d => {
            // 只要有工时就计入（包含周末加班、正常工作日）
            const hours = d.workHours || 0;

            if(hours > 0) {
                clockInDays++;
                totalHours += hours;
                totalOvertime += (d.workOvertime || 0);
            }
        });

        // 日均工时 = 总工时 / 打卡天数
        const avgHours = clockInDays > 0 ? (totalHours / clockInDays).toFixed(1) : 0;
        const totalOvertimeHours = (totalOvertime / 60).toFixed(1);

        const stats = [
            { label: '打卡天数', value: clockInDays + '天', icon: '📅', color: '#007AFF' },
            { label: '总工时', value: totalHours.toFixed(1) + 'h', icon: '⏱️', color: '#34C759' },
            { label: '日均工时', value: avgHours + 'h', icon: '📊', color: '#5856D6' },
            { label: '总加班', value: totalOvertimeHours + 'h', icon: '🌙', color: '#FF9500' }
        ];

        const html = stats.map(s => `
            <div class="stat-card">
                <div class="stat-icon">${s.icon}</div>
                <div class="stat-value" style="color: ${s.color}">${s.value}</div>
                <div class="stat-label">${s.label}</div>
            </div>
        `).join('');

        document.getElementById('statGrid').innerHTML = html;
    }

    function renderDetailTable(data) {
        const tbody = document.getElementById('detailTableBody');
        if(!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px;">无数据</td></tr>';
            return;
        }

        let html = '';
        data.forEach(row => {
            // 状态标签
            let statusHtml = '';
            if(row.isRest === '1') statusHtml += '<span class="tag tag-normal" style="background:#f2f2f7; color:#8e8e93;">休息</span> ';
            else if(row.isAbsenteeism === '1') statusHtml += '<span class="tag tag-late">旷工</span> ';
            else {
                if(row.isLate === '1') statusHtml += '<span class="tag tag-late">迟到</span> ';
                if(row.isEarly === '1') statusHtml += '<span class="tag tag-late">早退</span> ';
                if(row.isOut === '1') statusHtml += '<span class="tag tag-normal">出差</span> ';
                if(!statusHtml) statusHtml = '<span class="tag tag-normal">正常</span>';
            }

            // 加班工时换算
            const overtimeHours = row.workOvertime ? (row.workOvertime / 60).toFixed(1) : '-';
            const hasOvertime = row.workOvertime > 0;

            const rowHTML = '<tr>' +
                '<td style="color:#8e8e93;">' + (row.clockInDate || '') + '</td>' +
                '<td>' + (row.dayOfWeek || '') + '</td>' +
                '<td title="' + (row.checkInRule || '-') + '">' + (row.checkInRule || '-') + '</td>' +
                '<td style="font-weight:600; color: #007AFF;">' + (row.workHours ? row.workHours.toFixed(1) : '-') + '</td>' +
                '<td style="' + (hasOvertime ? 'color:#ff9500; font-weight:600;' : '') + '">' + overtimeHours + '</td>' +
                '<td>' + statusHtml + '</td>' +
                '</tr>';
            html += rowHTML;
        });
        tbody.innerHTML = html;
    }

    function initCharts(data) {
        // 工时趋势图
        const trendDom = document.getElementById('trendChart');
        trendChart = echarts.init(trendDom);

        // 倒序数据用于图表显示（左旧右新符合直觉），表格是降序（上新下旧）
        // 这里深拷贝一份并反转
        const chartData = [...data].reverse();

        const dates = chartData.map(d => d.clockInDate.slice(5)); // MM-dd
        const hours = chartData.map(d => d.workHours || 0);
        const overtimes = chartData.map(d => (d.workOvertime / 60).toFixed(1) || 0);

        trendChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['工时', '加班(小时)'], bottom: 0 },
            grid: { left: '2%', right: '2%', bottom: '10%', containLabel: true, top: '5%' },
            xAxis: {
                type: 'category',
                data: dates,
                axisTick: { alignWithLabel: true }
            },
            yAxis: { type: 'value' },
            series: [
                {
                    name: '工时',
                    type: 'bar',
                    data: hours,
                    barMaxWidth: 30,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: '#007AFF' },
                            { offset: 1, color: '#5AC8FA' }
                        ]),
                        borderRadius: [4, 4, 0, 0]
                    }
                },
                {
                    name: '加班(小时)',
                    type: 'line',
                    data: overtimes,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    itemStyle: { color: '#FF9500' },
                    lineStyle: { width: 3, shadowColor: 'rgba(255, 149, 0, 0.5)', shadowBlur: 10 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(255, 149, 0, 0.2)' },
                            { offset: 1, color: 'rgba(255, 149, 0, 0)' }
                        ])
                    }
                }
            ]
        });

        // Resize
        window.addEventListener('resize', () => {
            trendChart && trendChart.resize();
        });
    }

    // --- 启动 ---
    initDates();
    setupStatsToggle(); // 初始化统计方式切换
    initInfiniteScroll();
    resetSearch(); // 首次加载

</script>
</body>
</html>
